function LabOrderForm({token,patient,onSave,onCancel}){
  const toast=useToast();
  const [selectedTests,setSelectedTests]=useState([]);
  const [form,setForm]=useState({clinical_indication:'',priority:'routine',facility:'LabCorp',icd10_codes:[],notes:''});
  const [saving,setSaving]=useState(false);

  const addTest=t=>{
    if(!selectedTests.some(s=>s.name===t.name&&s.code===t.code))
      setSelectedTests(prev=>[...prev,t]);
  };
  const removeTest=i=>setSelectedTests(prev=>prev.filter((_,idx)=>idx!==i));

  const submit=async e=>{
    e.preventDefault();
    if(!selectedTests.length){toast('Select at least one test','error');return;}
    setSaving(true);
    try{
      const payload={
        ...form,
        patient_id:patient.id,
        // Store full test objects as JSON so order-submission can resolve codes
        tests:selectedTests.map(t=>t.name),            // display name array (legacy)
        test_objects:JSON.stringify(selectedTests),      // {name, code, category, specimen}
      };
      const d=await api('POST','/api/lab-orders',payload,token);
      if(d){toast('Lab order created');onSave(d);}
    }catch(e){toast(e.message,'error');}
    setSaving(false);
  };

  return(
    <div className="card" style={{marginTop:12,border:'2px solid #2563eb'}}>
      <h3 style={{fontWeight:700,marginBottom:12}}>New Lab Order — {patient.first_name} {patient.last_name}</h3>
      <form onSubmit={submit}>
        <div style={{marginBottom:16}}>
          <label className="label" style={{marginBottom:8}}>Tests <span style={{color:'#94a3b8',fontWeight:400}}>({selectedTests.length} selected)</span></label>
          <LabTestPicker token={token} selectedTests={selectedTests} onAdd={addTest} onRemove={removeTest}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div><label className="label">Clinical Indication</label><input className="input" value={form.clinical_indication} onChange={e=>setForm({...form,clinical_indication:e.target.value})}/></div>
          <div><label className="label">Priority</label>
            <select className="input" value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}>
              <option value="routine">Routine</option><option value="stat">STAT</option><option value="asap">ASAP</option>
            </select>
          </div>
          <div style={{gridColumn:'span 2'}}><label className="label">Notes</label><input className="input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Additional instructions…"/></div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary" type="submit" disabled={saving||!selectedTests.length}>{saving?<Spinner/>:`Create Order (${selectedTests.length} test${selectedTests.length!==1?'s':''})`}</button>
          <button className="btn btn-secondary" type="button" onClick={onCancel}>Cancel</button>
        </div>
      </form>
    </div>
  );
}

const IMAGING_STATUS={
  ordered:          {color:'#64748b', bg:'#f1f5f9', label:'Ordered'},
  faxed:            {color:'#2563eb', bg:'#eff6ff', label:'Faxed'},
  scheduled:        {color:'#7c3aed', bg:'#f5f3ff', label:'Scheduled'},
  completed:        {color:'#0891b2', bg:'#ecfeff', label:'Completed'},
  results_received: {color:'#16a34a', bg:'#f0fdf4', label:'Results In'},
  cancelled:        {color:'#dc2626', bg:'#fef2f2', label:'Cancelled'},
};

const FAX_STATUS_ICON={'pending':'⏳','queued':'📤','sending':'📤','delivered':'✅','failed':'❌'};

function ImagingOrderCard({order:initial, token, onUpdate}){
  const toast=useToast();
  const [order,setOrder]=useState(initial);
  const [showResults,setShowResults]=useState(false);
  const [resultNotes,setResultNotes]=useState('');
  const [resultFile,setResultFile]=useState(null);
  const [saving,setSaving]=useState(false);

  const update=async(patch)=>{
    const d=await api('PUT',`/api/imaging-orders/${order.id}`,patch,token).catch(e=>{toast(e.message,'error');return null;});
    if(d){setOrder(d);onUpdate(d);}
  };

  const faxOrder=async()=>{
    setSaving(true);
    const d=await api('POST',`/api/imaging-orders/${order.id}/fax`,{},token).catch(e=>{toast(e.message,'error');return null;});
    if(d){setOrder(d);onUpdate(d);toast('📠 Imaging order faxed to radiology');}
    setSaving(false);
  };

  const refreshFax=async()=>{
    const d=await api('GET',`/api/imaging-orders/${order.id}/fax-status`,null,token).catch(()=>null);
    if(d){setOrder(d);onUpdate(d);}
  };

  const submitResults=async()=>{
    setSaving(true);
    try{
      if(resultFile){
        const fd=new FormData();
        fd.append('result_file',resultFile);
        fd.append('result_notes',resultNotes);
        const r=await fetch(`/api/imaging-orders/${order.id}/results`,{method:'POST',headers:{'Authorization':`Bearer ${token}`},body:fd});
        if(!r.ok)throw new Error(await r.text());
        const d=await r.json();setOrder(d);onUpdate(d);
      } else {
        const d=await api('POST',`/api/imaging-orders/${order.id}/results`,{result_notes:resultNotes},token);
        if(d){setOrder(d);onUpdate(d);}
      }
      toast('✅ Results saved');setShowResults(false);
    }catch(e){toast(e.message,'error');}
    setSaving(false);
  };

  const st=IMAGING_STATUS[order.status]||IMAGING_STATUS.ordered;
  const priority_color=order.priority==='STAT'?'#dc2626':order.priority==='urgent'?'#d97706':'#64748b';

  return(
    <div className="card" style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <span style={{fontWeight:700,fontSize:15}}>🩻 {order.study_type}{order.body_part?' — '+order.body_part:''}</span>
            <span style={{fontSize:12,fontWeight:600,color:priority_color,background:order.priority==='STAT'?'#fee2e2':order.priority==='urgent'?'#fef3c7':'#f1f5f9',borderRadius:4,padding:'1px 6px'}}>{order.priority?.toUpperCase()}</span>
            <span style={{fontSize:12,fontWeight:600,color:st.color,background:st.bg,borderRadius:4,padding:'1px 6px'}}>{st.label}</span>
          </div>
          <div style={{fontSize:13,color:'#64748b',marginBottom:2}}>
            {order.facility&&<span>🏥 {order.facility}</span>}
            {order.fax_number&&<span style={{marginLeft:8}}>📠 {order.fax_number}</span>}
            {order.cpt_code&&<span style={{marginLeft:8}}>CPT: {order.cpt_code}</span>}
            <span style={{marginLeft:8}}>📅 {order.created_at?.slice(0,10)}</span>
          </div>
          {order.clinical_indication&&<div style={{fontSize:13,color:'#475569',marginBottom:2}}>Indication: {order.clinical_indication}</div>}
          {order.fax_status&&order.fax_status!=='pending'&&(
            <div style={{fontSize:12,color:'#94a3b8',marginTop:2,cursor:'pointer'}} onClick={refreshFax}>
              Fax: {FAX_STATUS_ICON[order.fax_status]||''} {order.fax_status} {order.fax_sent_at&&'· '+order.fax_sent_at.slice(0,10)} <span style={{color:'#93c5fd',fontSize:11}}>(refresh)</span>
            </div>
          )}
          {order.scheduled_at&&<div style={{fontSize:12,color:'#7c3aed',marginTop:2}}>📅 Scheduled: {order.scheduled_at.slice(0,10)}</div>}
          {order.results_received_at&&<div style={{fontSize:12,color:'#16a34a',marginTop:2}}>✅ Results received: {order.results_received_at.slice(0,10)}</div>}
          {order.result_notes&&<div style={{fontSize:13,color:'#1e293b',marginTop:4,background:'#f0fdf4',borderRadius:4,padding:'6px 10px',border:'1px solid #bbf7d0'}}><b>Report:</b> {order.result_notes}</div>}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'flex-start'}}>
          {order.status==='ordered'&&order.fax_number&&(
            <button className="btn btn-primary" style={{fontSize:12,padding:'4px 10px'}} onClick={faxOrder} disabled={saving}>
              {saving?<Spinner/>:<>📠 Fax to Radiology</>}
            </button>
          )}
          {(order.status==='faxed'||order.status==='ordered')&&(
            <button className="btn btn-outline" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>update({status:'scheduled'})}>Mark Scheduled</button>
          )}
          {order.status==='scheduled'&&(
            <button className="btn btn-outline" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>update({status:'completed'})}>Mark Completed</button>
          )}
          {(order.status==='completed'||order.status==='scheduled'||order.status==='faxed')&&(
            <button className="btn btn-primary" style={{fontSize:12,padding:'4px 10px',background:'#16a34a'}} onClick={()=>setShowResults(true)}>📋 Add Results</button>
          )}
          {order.status!=='cancelled'&&order.status!=='results_received'&&(
            <button className="btn btn-danger" style={{fontSize:12,padding:'4px 8px'}} onClick={()=>update({status:'cancelled'})}>✕</button>
          )}
        </div>
      </div>
      {showResults&&(
        <div style={{marginTop:12,background:'#f8fafc',borderRadius:6,padding:12,border:'1px solid #e2e8f0'}}>
          <div style={{fontWeight:600,marginBottom:8}}>📋 Enter Results / Radiology Report</div>
          <textarea className="input" rows={4} style={{width:'100%',marginBottom:8}} placeholder="Radiologist impression / findings…" value={resultNotes} onChange={e=>setResultNotes(e.target.value)}/>
          <div style={{marginBottom:8}}>
            <label className="label">Attach Report PDF (optional)</label>
            <input type="file" accept="application/pdf" onChange={e=>setResultFile(e.target.files[0])} style={{fontSize:13}}/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" style={{background:'#16a34a'}} onClick={submitResults} disabled={saving}>{saving?<Spinner/>:'Save Results'}</button>
            <button className="btn btn-secondary" onClick={()=>setShowResults(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ICD10Search({selected, onChange}){
  const [query,setQuery]=useState('');
  const [results,setResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const [showDrop,setShowDrop]=useState(false);
  const ref=useRef(null);

  // Close dropdown on outside click
  useEffect(()=>{
    const handler=e=>{if(ref.current&&!ref.current.contains(e.target))setShowDrop(false);};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  useEffect(()=>{
    if(query.length<2){setResults([]);setShowDrop(false);return;}
    const timer=setTimeout(async()=>{
      setSearching(true);
      try{
        const r=await fetch(`https://clinicaltables.nlm.nih.gov/api/icd10cm/v3/search?terms=${encodeURIComponent(query)}&maxList=10&sf=code,name&df=code,name`);
        const data=await r.json();
        // data[3] = [[code, description], ...]
        const hits=(data[3]||[]).map(([code,desc])=>({code,desc}));
        setResults(hits);
        setShowDrop(hits.length>0);
      }catch(e){setResults([]);}
      setSearching(false);
    },250);
    return()=>clearTimeout(timer);
  },[query]);

  const add=item=>{
    if(!selected.find(s=>s.code===item.code)){
      onChange([...selected,item]);
    }
    setQuery('');setResults([]);setShowDrop(false);
  };

  const remove=code=>onChange(selected.filter(s=>s.code!==code));

  return(
    <div ref={ref}>
      {/* Selected tags */}
      {selected.length>0&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6}}>
          {selected.map(s=>(
            <span key={s.code} style={{display:'inline-flex',alignItems:'center',gap:4,background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:4,padding:'2px 8px',fontSize:12,color:'#1d4ed8'}}>
              <b>{s.code}</b> {s.desc}
              <button type="button" onClick={()=>remove(s.code)} style={{background:'none',border:'none',cursor:'pointer',color:'#93c5fd',fontSize:14,lineHeight:1,padding:'0 0 0 2px'}}>×</button>
            </span>
          ))}
        </div>
      )}
      {/* Search input */}
      <div style={{position:'relative'}}>
        <input
          className="input"
          value={query}
          onChange={e=>setQuery(e.target.value)}
          onFocus={()=>results.length>0&&setShowDrop(true)}
          placeholder="Type diagnosis name or ICD-10 code…"
          autoComplete="off"
        />
        {searching&&<span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:12,color:'#94a3b8'}}>searching…</span>}
        {showDrop&&(
          <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',border:'1px solid #e2e8f0',borderRadius:6,boxShadow:'0 4px 12px rgba(0,0,0,0.1)',zIndex:100,maxHeight:220,overflowY:'auto'}}>
            {results.map(item=>(
              <div key={item.code}
                onMouseDown={e=>{e.preventDefault();add(item);}}
                style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',fontSize:13}}
                onMouseEnter={e=>e.currentTarget.style.background='#f0f9ff'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}
              >
                <span style={{fontWeight:700,color:'#2563eb',marginRight:8}}>{item.code}</span>
                <span style={{color:'#374151'}}>{item.desc}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const SIG_TEMPLATES=[
  {label:'Once daily',        sig:'Take 1 tablet by mouth once daily'},
  {label:'Twice daily',       sig:'Take 1 tablet by mouth twice daily'},
  {label:'Three times daily', sig:'Take 1 tablet by mouth three times daily'},
  {label:'Every 4–6 hrs PRN', sig:'Take 1 tablet by mouth every 4–6 hours as needed for pain'},
  {label:'At bedtime',        sig:'Take 1 tablet by mouth at bedtime'},
  {label:'With meals',        sig:'Take 1 tablet by mouth with meals'},
  {label:'Apply topically',   sig:'Apply thin film to affected area twice daily'},
  {label:'Inhale',            sig:'Inhale 2 puffs by mouth every 4–6 hours as needed'},
  {label:'Sublingual',        sig:'Place 1 tablet under tongue as needed; may repeat in 5 min × 2'},
];

const DEA_COLORS={II:'#dc2626',III:'#d97706',IV:'#d97706',V:'#64748b'};

function PrescribingTab({token,patient,user}){
  const toast=useToast();
  const [rxList,setRxList]=useState([]);
  const [showForm,setShowForm]=useState(false);
  const [editRx,setEditRx]=useState(null);
  const [showEpcs,setShowEpcs]=useState(null); // rx object awaiting EPCS
  const [epcsCode,setEpcsCode]=useState('');
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    api('GET',`/api/patients/${patient.id}/prescriptions`,null,token).then(d=>d&&setRxList(d));
  },[patient.id,token]);

  const signRx=async(rx,code='')=>{
    if(rx.is_controlled&&!code){setShowEpcs(rx);return;}
    setLoading(true);
    try{
      const body=rx.is_controlled?{epcs_code:code}:{};
      const d=await api('POST',`/api/prescriptions/${rx.id}/sign`,body,token);
      if(d){setRxList(prev=>prev.map(r=>r.id===d.id?d:r));toast('Prescription signed');setShowEpcs(null);setEpcsCode('');}
    }catch(e){toast(e.message,'error');}
    setLoading(false);
  };

  const transmitRx=async(id)=>{
    setLoading(true);
    try{
      const d=await api('POST',`/api/prescriptions/${id}/transmit`,{},token);
      if(d){
        setRxList(prev=>prev.map(r=>r.id===d.id?d:r));
        const p=d.eprescribe_platform||'';
        const msg=p==='weno'?'✓ Sent to pharmacy via WENO e-Prescribing'
          :p==='print/fax'?'Ready to print/fax — no e-prescribing platform configured'
          :p==='telnyx-fax'?'Queued for fax via Telnyx'
          :'Prescription transmitted electronically';
        toast(msg);
      }
    }catch(e){toast(e.message,'error');}
    setLoading(false);
  };

  const printRx=async(id,name)=>{
    try{
      const resp=await fetch(`/api/prescriptions/${id}/pdf`,{headers:{Authorization:`Bearer ${token}`}});
      if(!resp.ok)throw new Error('PDF failed');
      const blob=await resp.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`rx_${name.replace(/ /g,'_')}.pdf`;a.click();URL.revokeObjectURL(url);
    }catch(e){toast(e.message,'error');}
  };

  const faxRx=async(id)=>{
    setLoading(true);
    try{
      const d=await api('POST',`/api/prescriptions/${id}/fax`,{},token);
      if(d){
        setRxList(prev=>prev.map(r=>r.id===id?{...r,fax_id:d.fax_id,fax_status:d.fax_status,status:'transmitted',eprescribe_platform:'telnyx-fax'}:r));
        toast(`📠 Fax queued — ID: ${d.fax_id}`);
      }
    }catch(e){toast(e.message,'error');}
    setLoading(false);
  };

  const refreshFaxStatus=async(id)=>{
    try{
      const d=await api('GET',`/api/prescriptions/${id}/fax-status`,null,token);
      if(d)setRxList(prev=>prev.map(r=>r.id===id?{...r,fax_status:d.fax_status}:r));
    }catch(e){toast(e.message,'error');}
  };

  const cancelRx=async(id)=>{
    if(!confirm('Cancel this prescription?'))return;
    await api('DELETE',`/api/prescriptions/${id}`,null,token).catch(e=>toast(e.message,'error'));
    setRxList(prev=>prev.map(r=>r.id===id?{...r,status:'cancelled'}:r));
    toast('Prescription cancelled');
  };

  const STATUS_STYLE={
    draft:     {bg:'#f1f5f9',color:'#64748b',label:'Draft'},
    signed:    {bg:'#dbeafe',color:'#1d4ed8',label:'Signed'},
    transmitted:{bg:'#dcfce7',color:'#15803d',label:'Transmitted'},
    filled:    {bg:'#d1fae5',color:'#065f46',label:'Filled'},
    cancelled: {bg:'#fee2e2',color:'#dc2626',label:'Cancelled'},
  };

  return(
    <div>
      {/* EPCS 2-FA modal */}
      {showEpcs&&(
        <div className="modal-overlay" onClick={()=>{setShowEpcs(null);setEpcsCode('');}}>
          <div className="modal" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'24px 28px'}}>
              <h2 style={{fontWeight:700,fontSize:17,marginBottom:4}}>EPCS Authentication Required</h2>
              <p style={{fontSize:13,color:'#64748b',marginBottom:16}}>
                <b>{showEpcs.drug_name}</b> is a Schedule {showEpcs.dea_schedule} controlled substance.<br/>
                Enter your two-factor authentication code to sign this prescription electronically.
              </p>
              <div style={{background:'#fee2e2',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#991b1b'}}>
                ⚠ DEA EPCS regulations require a second authentication factor for all Schedule II–V prescriptions.
              </div>
              <label className="label">Authentication Code</label>
              <input className="input" type="text" inputMode="numeric" maxLength={8}
                placeholder="Enter code from authenticator app or hard token"
                value={epcsCode} onChange={e=>setEpcsCode(e.target.value)}
                style={{letterSpacing:4,fontSize:18,textAlign:'center',marginBottom:16}}
                autoFocus/>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary" style={{background:'#dc2626'}}
                  onClick={()=>signRx(showEpcs,epcsCode)} disabled={!epcsCode||loading}>
                  {loading?<Spinner/>:'Sign Controlled Substance'}
                </button>
                <button className="btn btn-secondary" onClick={()=>{setShowEpcs(null);setEpcsCode('');}}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div>
          <span style={{fontSize:13,color:'#64748b'}}>{rxList.filter(r=>r.status!=='cancelled').length} active prescriptions</span>
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditRx(null);setShowForm(true);}}>
          <Icon name="pill" size={15}/>New Prescription
        </button>
      </div>

      {showForm&&(
        <PrescriptionForm token={token} patient={patient} rx={editRx}
          onSave={d=>{
            setRxList(prev=>editRx?prev.map(r=>r.id===d.id?d:r):[d,...prev]);
            setShowForm(false);setEditRx(null);toast('Prescription saved');
          }}
          onCancel={()=>{setShowForm(false);setEditRx(null);}}
        />
      )}

      {rxList.length===0&&!showForm&&(
        <div className="card" style={{textAlign:'center',color:'#94a3b8',padding:40}}>No prescriptions yet</div>
      )}

      {rxList.map(rx=>{
        const ss=STATUS_STYLE[rx.status]||STATUS_STYLE.draft;
        const isControlled=rx.is_controlled||rx.dea_schedule;
        return(
          <div key={rx.id} className="card" style={{marginBottom:10,
            borderLeft:`4px solid ${isControlled?DEA_COLORS[rx.dea_schedule]||'#d97706':'#e2e8f0'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}}>
                  <span style={{fontWeight:700,fontSize:15}}>{rx.drug_name}</span>
                  {rx.strength&&<span style={{fontSize:13,color:'#475569'}}>{rx.strength}</span>}
                  {rx.dosage_form&&<span style={{fontSize:12,color:'#94a3b8'}}>({rx.dosage_form})</span>}
                  {isControlled&&(
                    <span style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:10,
                      background:DEA_COLORS[rx.dea_schedule]+'22',color:DEA_COLORS[rx.dea_schedule]}}>
                      CII{rx.dea_schedule!=='II'?'I':''} Sch {rx.dea_schedule}
                    </span>
                  )}
                </div>
                <div style={{fontSize:13,color:'#475569',marginBottom:2}}>{rx.sig||'—'}</div>
                <div style={{fontSize:12,color:'#94a3b8'}}>
                  Qty: {rx.quantity} {rx.quantity_unit} · {rx.days_supply}d · Refills: {rx.refills}
                  {rx.daw&&<span style={{marginLeft:8,fontWeight:600,color:'#7c3aed'}}>DAW</span>}
                </div>
                {rx.pharmacy_name&&<div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>
                  <span>🏪 {rx.pharmacy_name}</span>
                  {rx.pharmacy_phone&&<span style={{marginLeft:8}}>{rx.pharmacy_phone}</span>}
                  {rx.pharmacy_fax&&<span style={{marginLeft:8}}>Fax: {rx.pharmacy_fax}</span>}
                </div>}
                <div style={{fontSize:11,color:'#94a3b8',marginTop:2,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  {rx.prescriber_name&&<span>Prescriber: {rx.prescriber_name}</span>}
                  {rx.signed_at&&<span>Signed: {rx.signed_at?.slice(0,10)}</span>}
                  {rx.eprescribe_platform==='weno'&&(()=>{
                    const WENO_STATUS={
                      sent:                  {icon:'📤',color:'#2563eb',label:'Sent via WENO'},
                      routed:                {icon:'🔀',color:'#7c3aed',label:'Routed to Pharmacy'},
                      delivered:             {icon:'✅',color:'#16a34a',label:'Pharmacy Confirmed'},
                      error:                 {icon:'⚠️',color:'#dc2626',label:'WENO Error'},
                      cancelled_by_pharmacy: {icon:'🚫',color:'#dc2626',label:'Pharmacy Cancelled'},
                    };
                    const ws=WENO_STATUS[rx.eprescribe_status]||{icon:'📋',color:'#2563eb',label:'WENO e-Rx'};
                    return<span style={{color:ws.color}}>{ws.icon} {ws.label}</span>;
                  })()}
                  {rx.eprescribe_platform==='telnyx-fax'&&
                    <span style={{color:'#0891b2'}}>📠 Fax</span>}
                  {rx.eprescribe_platform&&!['print/fax','telnyx-fax','weno'].includes(rx.eprescribe_platform)&&
                    <span style={{color:'#16a34a'}}>● e-Rx via {rx.eprescribe_platform}</span>}
                  {rx.fax_status&&(()=>{
                    const FAX_BADGE={
                      queued:    {bg:'#fef9c3',color:'#92400e',label:'📠 Fax Queued'},
                      processing:{bg:'#dbeafe',color:'#1e40af',label:'📠 Processing'},
                      sending:   {bg:'#dbeafe',color:'#1e40af',label:'📠 Sending…'},
                      delivered: {bg:'#dcfce7',color:'#15803d',label:'📠 Fax Delivered ✓'},
                      failed:    {bg:'#fee2e2',color:'#dc2626',label:'📠 Fax Failed ✗'},
                    };
                    const fb=FAX_BADGE[rx.fax_status]||{bg:'#f1f5f9',color:'#64748b',label:`📠 ${rx.fax_status}`};
                    return(
                      <span style={{padding:'1px 8px',borderRadius:10,fontSize:11,background:fb.bg,color:fb.color,cursor:'pointer'}}
                        onClick={()=>refreshFaxStatus(rx.id)} title="Click to refresh fax status">
                        {fb.label}

                  })()}
                </div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end',flexShrink:0}}>

                  background:ss.bg,color:ss.color}}>{ss.label}</span>
                <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  {rx.status==='draft'&&<>
                    <button className="btn btn-outline" style={{fontSize:11,padding:'3px 9px'}}
                      onClick={()=>{setEditRx(rx);setShowForm(true);}}>Edit</button>
                    <button className="btn btn-primary" style={{fontSize:11,padding:'3px 9px',
                      background:isControlled?'#dc2626':'#2563eb'}}
                      onClick={()=>signRx(rx)}>
                      {isControlled?'⚠ Sign (EPCS)':'Sign'}
                    </button>
                    <button style={{background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:6,
                      padding:'3px 8px',cursor:'pointer',fontSize:11}} onClick={()=>cancelRx(rx.id)}>✕</button>
                  </>}
                  {rx.status==='signed'&&<>
                    {rx.pharmacy_fax&&(
                      <button className="btn btn-primary" style={{fontSize:11,padding:'3px 9px',background:'#0891b2'}}
                        onClick={()=>faxRx(rx.id)} disabled={loading}>
                        📠 Fax to Pharmacy
                      </button>
                    )}
                    <button className="btn btn-primary" style={{fontSize:11,padding:'3px 9px'}}
                      onClick={()=>transmitRx(rx.id)} disabled={loading}>
                      <Icon name="send" size={12}/>Send to Pharmacy
                    </button>
                    <button className="btn btn-outline" style={{fontSize:11,padding:'3px 9px'}}
                      onClick={()=>printRx(rx.id,rx.drug_name)}>⬇ PDF</button>
                  </>}
                  {rx.status==='transmitted'&&<>
                    {rx.pharmacy_fax&&!rx.fax_id&&(
                      <button className="btn btn-outline" style={{fontSize:11,padding:'3px 9px',borderColor:'#0891b2',color:'#0891b2'}}
                        onClick={()=>faxRx(rx.id)} disabled={loading}>
                        📠 Fax
                      </button>
                    )}
                    <button className="btn btn-outline" style={{fontSize:11,padding:'3px 9px'}}
                      onClick={()=>printRx(rx.id,rx.drug_name)}>⬇ PDF</button>
                  </>}
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PrescriptionForm({token,patient,rx,onSave,onCancel}){
  const toast=useToast();
  const [form,setForm]=useState({
    drug_name:rx?.drug_name||'',rxcui:rx?.rxcui||'',strength:rx?.strength||'',
    dosage_form:rx?.dosage_form||'',sig:rx?.sig||'',quantity:rx?.quantity||30,
    quantity_unit:rx?.quantity_unit||'tablet(s)',days_supply:rx?.days_supply||30,
    refills:rx?.refills||0,daw:rx?.daw||false,
    pharmacy_name:rx?.pharmacy_name||'',pharmacy_phone:rx?.pharmacy_phone||'',
    pharmacy_fax:rx?.pharmacy_fax||'',pharmacy_address:rx?.pharmacy_address||'',
    pharmacy_npi:rx?.pharmacy_npi||'',notes:rx?.notes||'',
    is_controlled:rx?.is_controlled||false,dea_schedule:rx?.dea_schedule||'',
  });
  const [saving,setSaving]=useState(false);
  // Drug search
  const [drugQuery,setDrugQuery]=useState(rx?.drug_name||'');
  const [drugResults,setDrugResults]=useState([]);
  const [searchingDrug,setSearchingDrug]=useState(false);
  const [showDrugResults,setShowDrugResults]=useState(false);
  const drugDebounce=useRef(null);
  // Related strengths/forms from RxNorm
  const [relatedForms,setRelatedForms]=useState([]);
  // Pharmacies
  const [savedPharmacies,setSavedPharmacies]=useState([]);
  const [showAddPharmacy,setShowAddPharmacy]=useState(false);
  const [newPharmacy,setNewPharmacy]=useState({name:'',phone:'',fax:'',address:'',npi:''});

  useEffect(()=>{
    api('GET','/api/pharmacies',null,token).then(d=>d&&setSavedPharmacies(d));
  },[token]);

  const searchDrug=async(q)=>{
    if(q.length<2){setDrugResults([]);setShowDrugResults(false);return;}
    setSearchingDrug(true);
    try{
      // NLM Clinical Tables API — purpose-built for drug name typeahead, full CORS support
      const r=await fetch(
        `https://clinicaltables.nlm.nih.gov/api/rxterms/v3/search?terms=${encodeURIComponent(q)}&ef=RXCUI,STRENGTHS_AND_FORMS&maxList=20`
      );
      if(!r.ok)throw new Error(`Search error ${r.status}`);
      const data=await r.json();
      // data[3] = display names, data[2].RXCUI = rxcuis (parallel arrays)
      const names=data[3]||[];
      const rxcuis=(data[2]&&data[2].RXCUI)||[];
      const drugs=names.map((name,i)=>({name,rxcui:rxcuis[i]||'',tty:''}));
      setDrugResults(drugs);
      setShowDrugResults(true); // show even if empty — will display "no results" message
    }catch(e){
      toast('Drug search unavailable: '+e.message,'error');
      setShowDrugResults(false);
    }
    setSearchingDrug(false);
  };

  const selectDrug=async(drug)=>{
    setForm(f=>({...f,drug_name:drug.name,rxcui:drug.rxcui}));
    setDrugQuery(drug.name);
    setShowDrugResults(false);
    // Fetch related forms/strengths and schedule
    try{
      const info=await api('GET',`/api/drugs/${drug.rxcui}/info`,null,token);
      if(info){
        setRelatedForms(info.related||[]);
        if(info.schedule){
          setForm(f=>({...f,dea_schedule:info.schedule,is_controlled:true}));
          toast(`⚠ Schedule ${info.schedule} controlled substance`,'error');
        }
      }
    }catch(e){}
  };

  const selectRelated=r=>{
    // Parse strength from name like "Lisinopril 10 MG Oral Tablet"
    const parts=r.name.split(' ');
    const strengthIdx=parts.findIndex(p=>/^\d/.test(p));
    const strength=strengthIdx>=0?parts.slice(strengthIdx).join(' '):'';
    setForm(f=>({...f,drug_name:r.name,rxcui:r.rxcui,strength}));
    setDrugQuery(r.name);setRelatedForms([]);
  };

  const selectPharmacy=ph=>{
    setForm(f=>({...f,
      pharmacy_name:ph.name,pharmacy_phone:ph.phone,pharmacy_fax:ph.fax,
      pharmacy_address:`${ph.address}${ph.city?', '+ph.city:''} ${ph.state} ${ph.zip_code}`.trim(),
      pharmacy_npi:ph.npi
    }));
  };

  const savePharmacy=async()=>{
    if(!newPharmacy.name){toast('Pharmacy name required','error');return;}
    const d=await api('POST','/api/pharmacies',newPharmacy,token).catch(e=>{toast(e.message,'error');return null;});
    if(d){setSavedPharmacies(prev=>[...prev,d]);selectPharmacy(d);setShowAddPharmacy(false);setNewPharmacy({name:'',phone:'',fax:'',address:'',npi:''});toast('Pharmacy saved');}
  };

  const submit=async e=>{
    e.preventDefault();
    if(!form.drug_name){toast('Drug name is required','error');return;}
    setSaving(true);
    try{
      const payload={...form,patient_id:patient.id};
      const d=rx
        ?await api('PUT',`/api/prescriptions/${rx.id}`,payload,token)
        :await api('POST','/api/prescriptions',payload,token);
      if(d)onSave(d);
    }catch(e){toast(e.message,'error');}
    setSaving(false);
  };

  const F=k=>e=>setForm(f=>({...f,[k]:e.target.type==='checkbox'?e.target.checked:e.target.value}));

  // Common chain pharmacies for quick select
  const CHAINS=[
    {name:'CVS Pharmacy',chain:'CVS'},{name:'Walgreens',chain:'Walgreens'},
    {name:'Walmart Pharmacy',chain:'Walmart'},{name:'Rite Aid',chain:'RiteAid'},
    {name:'Costco Pharmacy',chain:'Costco'},{name:'Kroger Pharmacy',chain:'Kroger'},
  ];

  return(
    <div className="card" style={{marginBottom:16,border:'2px solid #2563eb'}}>
      <h3 style={{fontWeight:700,fontSize:15,marginBottom:14,color:'#1e293b'}}>
        {rx?'Edit Prescription':'New Prescription'} — {patient.first_name} {patient.last_name}
      </h3>
      <form onSubmit={submit}>

        {/* ── Drug Search ── */}
        <div style={{marginBottom:14}}>
          <label className="label">Drug Name *</label>
          <div style={{position:'relative'}}>
            <input className="input" value={drugQuery}
              placeholder="Search by drug name…"
              onChange={e=>{
                setDrugQuery(e.target.value);
                setForm(f=>({...f,drug_name:e.target.value}));
                clearTimeout(drugDebounce.current);
                drugDebounce.current=setTimeout(()=>searchDrug(e.target.value),300);
              }}
              onFocus={()=>drugResults.length&&setShowDrugResults(true)}
              onBlur={()=>setTimeout(()=>setShowDrugResults(false),200)}
            />
            {searchingDrug&&<span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)'}}><Spinner/></span>}
            {showDrugResults&&(
              <div style={{position:'absolute',zIndex:999,background:'#fff',border:'1px solid #e2e8f0',
                borderRadius:8,boxShadow:'0 4px 20px rgba(0,0,0,.1)',width:'100%',maxHeight:220,overflowY:'auto',top:'calc(100% + 4px)'}}>
                {drugResults.length===0
                  ?<div style={{padding:'10px 12px',fontSize:13,color:'#94a3b8'}}>No results found</div>
                  :drugResults.map((d,i)=>(
                    <div key={i} onMouseDown={()=>selectDrug(d)}
                      style={{padding:'8px 12px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #f8fafc'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#f0f9ff'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{fontWeight:500}}>{d.name}</span>
                      {d.tty&&<span style={{fontSize:11,color:'#94a3b8',marginLeft:8}}>{d.tty}</span>}
                    </div>
                  ))
                }
              </div>
            )}
          </div>
          {/* Related forms/strengths */}
          {relatedForms.length>0&&(
            <div style={{marginTop:6}}>
              <div style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>Select strength / form:</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {relatedForms.slice(0,12).map((r,i)=>(
                  <button key={i} type="button"
                    style={{fontSize:11,padding:'3px 9px',borderRadius:20,border:'1px solid #e2e8f0',
                      cursor:'pointer',background:form.rxcui===r.rxcui?'#dbeafe':'#f8fafc',
                      color:form.rxcui===r.rxcui?'#1e40af':'#475569'}}
                    onClick={()=>selectRelated(r)}>
                    {r.name.replace(form.drug_name.split(' ')[0],'').trim()||r.name}
                  </button>
                ))}
              </div>
            </div>
          )}
          {(form.is_controlled||form.dea_schedule)&&(
            <div style={{marginTop:6,padding:'6px 10px',background:'#fee2e2',borderRadius:6,fontSize:12,color:'#dc2626',fontWeight:600}}>
              ⚠ Controlled Substance — Schedule {form.dea_schedule} · EPCS required for electronic signing
            </div>
          )}
        </div>

        {/* ── Sig / Directions ── */}
        <div style={{marginBottom:14}}>
          <label className="label">Sig (Patient Directions)</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
            {SIG_TEMPLATES.map(t=>(
              <button key={t.label} type="button"
                style={{fontSize:11,padding:'3px 9px',borderRadius:20,border:'1px solid #e2e8f0',
                  cursor:'pointer',background:form.sig===t.sig?'#dbeafe':'#f8fafc',
                  color:form.sig===t.sig?'#1e40af':'#475569'}}
                onClick={()=>setForm(f=>({...f,sig:t.sig}))}>
                {t.label}
              </button>
            ))}
          </div>
          <textarea className="input" rows={2} value={form.sig} onChange={F('sig')}
            placeholder="Custom sig / directions…" style={{resize:'vertical'}}/>
        </div>

        {/* ── Quantity / Days / Refills ── */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:14}}>
          <div><label className="label">Quantity</label>
            <input className="input" type="number" min="1" value={form.quantity} onChange={F('quantity')}/></div>
          <div><label className="label">Unit</label>
            <select className="input" value={form.quantity_unit} onChange={F('quantity_unit')}>
              {['tablet(s)','capsule(s)','mL','patch(es)','inhaler(s)','gram(s)','unit(s)'].map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
          <div><label className="label">Days Supply</label>
            <input className="input" type="number" min="1" value={form.days_supply} onChange={F('days_supply')}/></div>
          <div><label className="label">Refills</label>
            <input className="input" type="number" min="0" max={form.is_controlled?0:12} value={form.refills} onChange={F('refills')}/>
            {form.is_controlled&&<div style={{fontSize:10,color:'#dc2626',marginTop:2}}>CII: no refills allowed</div>}
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:14}}>
            <input type="checkbox" checked={form.daw} onChange={F('daw')}/>
            <span>DAW — Dispense As Written (brand name only, no substitution)</span>
          </label>
        </div>

        {/* ── Pharmacy ── */}
        <div style={{marginBottom:14}}>
          <label className="label">Pharmacy</label>
          {/* Quick-select saved */}
          {savedPharmacies.length>0&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}}>
              {savedPharmacies.slice(0,8).map(ph=>(
                <button key={ph.id} type="button"
                  style={{fontSize:11,padding:'4px 10px',borderRadius:20,border:'1px solid',cursor:'pointer',
                    background:form.pharmacy_name===ph.name?'#dbeafe':'#f8fafc',
                    color:form.pharmacy_name===ph.name?'#1e40af':'#475569',
                    borderColor:form.pharmacy_name===ph.name?'#93c5fd':'#e2e8f0'}}
                  onClick={()=>selectPharmacy(ph)}>
                  {ph.name}
                </button>
              ))}
            </div>
          )}
          {/* Chain quick-picks (if no saved pharmacies yet) */}
          {savedPharmacies.length===0&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}}>
              {CHAINS.map(c=>(
                <button key={c.name} type="button"
                  style={{fontSize:11,padding:'4px 10px',borderRadius:20,border:'1px solid #e2e8f0',cursor:'pointer',
                    background:form.pharmacy_name===c.name?'#dbeafe':'#f8fafc',
                    color:form.pharmacy_name===c.name?'#1e40af':'#475569'}}
                  onClick={()=>setForm(f=>({...f,pharmacy_name:c.name}))}>
                  {c.name}
                </button>
              ))}
            </div>
          )}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label className="label" style={{fontSize:11}}>Pharmacy Name</label>
              <input className="input" value={form.pharmacy_name} onChange={F('pharmacy_name')} placeholder="Name or chain"/></div>
            <div><label className="label" style={{fontSize:11}}>Phone</label>
              <input className="input" value={form.pharmacy_phone} onChange={F('pharmacy_phone')} placeholder="+15551234567"/></div>
            <div><label className="label" style={{fontSize:11}}>Fax</label>
              <input className="input" value={form.pharmacy_fax} onChange={F('pharmacy_fax')} placeholder="Fax number"/></div>
            <div><label className="label" style={{fontSize:11}}>Address</label>
              <input className="input" value={form.pharmacy_address} onChange={F('pharmacy_address')} placeholder="Street, City, State"/></div>
          </div>
          <button type="button" className="btn btn-outline" style={{marginTop:8,fontSize:11,padding:'3px 10px'}}
            onClick={()=>setShowAddPharmacy(!showAddPharmacy)}>
            {showAddPharmacy?'Cancel':'+ Save this pharmacy to directory'}
          </button>
          {showAddPharmacy&&(
            <div style={{marginTop:8,padding:12,background:'#f8fafc',borderRadius:8,border:'1px dashed #cbd5e1'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                {[['Name *','name'],['Phone','phone'],['Fax','fax'],['NPI','npi'],['Address','address']].map(([l,k])=>(
                  <div key={k}><label className="label" style={{fontSize:11}}>{l}</label>
                    <input className="input" value={newPharmacy[k]} onChange={e=>setNewPharmacy(p=>({...p,[k]:e.target.value}))} placeholder={l}/>
                  </div>
                ))}
              </div>
              <button type="button" className="btn btn-primary" style={{fontSize:12,padding:'4px 12px'}} onClick={savePharmacy}>Save to Directory</button>
            </div>
          )}
        </div>

        {/* ── Notes ── */}
        <div style={{marginBottom:16}}>
          <label className="label">Notes / Special Instructions</label>
          <input className="input" value={form.notes} onChange={F('notes')} placeholder="e.g. Patient counseled on side effects"/>
        </div>

        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary" type="submit" disabled={saving||!form.drug_name}>
            {saving?<Spinner/>:rx?'Update Prescription':'Save as Draft'}
          </button>
          <button className="btn btn-secondary" type="button" onClick={onCancel}>Cancel</button>
        </div>
      </form>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// HISTORY & MEDS TAB
// ═══════════════════════════════════════════════════════════════════════════════
function HistoryMedsTab({token,patient}){
  const toast=useToast();
  const [meds,setMeds]=useState([]);
  const [history,setHistory]=useState([]);
  const [showMedForm,setShowMedForm]=useState(false);
  const [editMed,setEditMed]=useState(null);
  const [showHistoryForm,setShowHistoryForm]=useState(null); // null or entry_type string
  const [editHistory,setEditHistory]=useState(null);

  useEffect(()=>{
    api('GET',`/api/patients/${patient.id}/medications`,null,token).then(d=>d&&setMeds(d));
    api('GET',`/api/patients/${patient.id}/history`,null,token).then(d=>d&&setHistory(d));
  },[patient.id,token]);

  const deleteMed=async(id)=>{
    if(!confirm('Remove this medication?'))return;
    await api('DELETE',`/api/medications/${id}`,null,token).catch(e=>toast(e.message,'error'));
    setMeds(prev=>prev.filter(m=>m.id!==id));toast('Medication removed');
  };
  const deleteHx=async(id)=>{
    if(!confirm('Remove this entry?'))return;
    await api('DELETE',`/api/history/${id}`,null,token).catch(e=>toast(e.message,'error'));
    setHistory(prev=>prev.filter(h=>h.id!==id));toast('Entry removed');
  };
  const hxByType=t=>history.filter(h=>h.entry_type===t);

  const SECTIONS=[
    {type:'problem',  label:'Problems / Active Conditions',color:'#dc2626'},
    {type:'allergy',  label:'Allergies',                  color:'#d97706'},
    {type:'surgical', label:'Surgical History',           color:'#7c3aed'},
    {type:'family',   label:'Family History',             color:'#0891b2'},
    {type:'social',   label:'Social History',             color:'#16a34a'},
    {type:'immunization',label:'Immunizations',           color:'#2563eb'},
  ];

  const statusColors={active:'#16a34a',resolved:'#64748b',inactive:'#94a3b8'};

  return(
    <div>
      {/* ── MEDICATIONS ── */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h3 style={{fontSize:15,fontWeight:700,color:'#1e293b'}}>💊 Active Medications</h3>
          <button className="btn btn-primary" style={{fontSize:12,padding:'5px 12px'}} onClick={()=>{setEditMed(null);setShowMedForm(true);}}>+ Add Medication</button>
        </div>

        {showMedForm&&(
          <MedicationForm token={token} patient={patient} med={editMed}
            onSave={m=>{setMeds(prev=>editMed?prev.map(x=>x.id===m.id?m:x):[m,...prev]);setShowMedForm(false);setEditMed(null);toast('Medication saved');}}
            onCancel={()=>{setShowMedForm(false);setEditMed(null);}}
          />
        )}

        {meds.filter(m=>m.is_active).length===0&&!showMedForm&&(
          <div style={{color:'#94a3b8',fontSize:14,padding:'8px 0'}}>No active medications on file</div>
        )}
        {meds.filter(m=>m.is_active).map(m=>(
          <div key={m.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'10px 0',borderBottom:'1px solid #f1f5f9'}}>
            <div>
              <span style={{fontWeight:600,fontSize:14}}>{m.name}</span>
              {m.dosage&&<span style={{color:'#475569',fontSize:13,marginLeft:8}}>{m.dosage}</span>}
              {m.frequency&&<span style={{color:'#475569',fontSize:13,marginLeft:6}}>· {m.frequency}</span>}
              {m.route&&m.route!=='oral'&&<span style={{color:'#94a3b8',fontSize:12,marginLeft:6}}>({m.route})</span>}
              <div style={{fontSize:12,color:'#94a3b8',marginTop:3}}>
                {m.indication&&<span>Indication: {m.indication}</span>}
                {m.prescriber&&<span style={{marginLeft:10}}>Prescriber: {m.prescriber}</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              <button className="btn btn-outline" style={{fontSize:11,padding:'3px 10px'}} onClick={()=>{setEditMed(m);setShowMedForm(true);}}>Edit</button>
              <button style={{background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:6,padding:'3px 8px',cursor:'pointer',fontSize:12}} onClick={()=>deleteMed(m.id)}>✕</button>
            </div>
          </div>
        ))}

        {meds.filter(m=>!m.is_active).length>0&&(
          <details style={{marginTop:10}}>
            <summary style={{fontSize:12,color:'#94a3b8',cursor:'pointer',userSelect:'none'}}>
              Discontinued ({meds.filter(m=>!m.is_active).length})
            </summary>
            {meds.filter(m=>!m.is_active).map(m=>(
              <div key={m.id} style={{padding:'6px 0',borderBottom:'1px solid #f8fafc',opacity:0.55,fontSize:13}}>
                <span style={{textDecoration:'line-through'}}>{m.name}</span>
                {m.dosage&&<span style={{marginLeft:6}}>{m.dosage}</span>}
              </div>
            ))}
          </details>
        )}
      </div>

      {/* ── HISTORY SECTIONS ── */}
      {SECTIONS.map(({type,label,color})=>(
        <div key={type} className="card" style={{marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <h3 style={{fontSize:14,fontWeight:700,color}}>{label}
              <span style={{fontWeight:400,color:'#94a3b8',fontSize:12,marginLeft:8}}>({hxByType(type).length})</span>
            </h3>
            <button className="btn btn-outline" style={{fontSize:11,padding:'3px 10px'}}
              onClick={()=>{setShowHistoryForm(showHistoryForm===type?null:type);setEditHistory(null);}}>
              {showHistoryForm===type?'Cancel':'+ Add'}
            </button>
          </div>

          {showHistoryForm===type&&(
            <HistoryEntryForm token={token} patient={patient} entryType={type} entry={editHistory?.entry_type===type?editHistory:null}
              onSave={h=>{setHistory(prev=>editHistory?prev.map(x=>x.id===h.id?h:x):[h,...prev]);setShowHistoryForm(null);setEditHistory(null);toast('Entry saved');}}
              onCancel={()=>{setShowHistoryForm(null);setEditHistory(null);}}
            />
          )}

          {hxByType(type).length===0&&showHistoryForm!==type&&(
            <div style={{color:'#94a3b8',fontSize:13}}>None recorded</div>
          )}
          {hxByType(type).map(h=>(
            <div key={h.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'8px 0',borderBottom:'1px solid #f8fafc'}}>
              <div>
                <span style={{fontWeight:500,fontSize:14}}>{h.description}</span>
                {h.detail&&<span style={{fontSize:13,color:'#64748b',marginLeft:8}}>— {h.detail}</span>}
                {h.onset_date&&<span style={{fontSize:12,color:'#94a3b8',marginLeft:8}}>({h.onset_date})</span>}
                {h.status&&h.status!=='active'&&(
                  <span style={{marginLeft:8,fontSize:11,padding:'2px 7px',borderRadius:10,background:'#f1f5f9',color:statusColors[h.status]||'#64748b'}}>{h.status}</span>
                )}
                {h.notes&&<div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{h.notes}</div>}
              </div>
              <div style={{display:'flex',gap:6,flexShrink:0}}>
                <button className="btn btn-outline" style={{fontSize:11,padding:'3px 10px'}} onClick={()=>{setEditHistory(h);setShowHistoryForm(type);}}>Edit</button>
                <button style={{background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:6,padding:'3px 8px',cursor:'pointer',fontSize:12}} onClick={()=>deleteHx(h.id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function MedicationForm({token,patient,med,onSave,onCancel}){
  const toast=useToast();
  const [form,setForm]=useState({
    name:med?.name||'',dosage:med?.dosage||'',frequency:med?.frequency||'',
    route:med?.route||'oral',start_date:med?.start_date||'',end_date:med?.end_date||'',
    prescriber:med?.prescriber||'',indication:med?.indication||'',
    is_active:med?.is_active!==undefined?med.is_active:true,notes:med?.notes||''
  });
  const [saving,setSaving]=useState(false);
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const submit=async e=>{
    e.preventDefault();
    if(!form.name.trim()){toast('Medication name is required','error');return;}
    setSaving(true);
    try{
      let d;
      if(med){d=await api('PUT',`/api/medications/${med.id}`,form,token);}
      else{d=await api('POST',`/api/patients/${patient.id}/medications`,form,token);}
      if(d)onSave(d);
    }catch(err){toast(err.message,'error');}
    setSaving(false);
  };

  return(
    <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:10,padding:16,marginBottom:12}}>
      <h4 style={{fontWeight:600,fontSize:14,marginBottom:12,color:'#1e293b'}}>{med?'Edit Medication':'Add Medication'}</h4>
      <form onSubmit={submit}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div><label className="label">Name *</label><input className="input" value={form.name} onChange={F('name')} placeholder="e.g. Lisinopril"/></div>
          <div><label className="label">Dosage</label><input className="input" value={form.dosage} onChange={F('dosage')} placeholder="e.g. 10 mg"/></div>
          <div><label className="label">Frequency</label><input className="input" value={form.frequency} onChange={F('frequency')} placeholder="e.g. once daily"/></div>
          <div><label className="label">Route</label>
            <select className="input" value={form.route} onChange={F('route')}>
              {['oral','topical','inhaled','sublingual','IV','IM','subcutaneous','nasal','ophthalmic','otic','rectal','transdermal','other'].map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <div><label className="label">Start Date</label><input className="input" type="date" value={form.start_date} onChange={F('start_date')}/></div>
          <div><label className="label">Prescriber</label><input className="input" value={form.prescriber} onChange={F('prescriber')} placeholder="Prescribing provider"/></div>
          <div style={{gridColumn:'span 2'}}><label className="label">Indication</label><input className="input" value={form.indication} onChange={F('indication')} placeholder="Reason for medication"/></div>
          <div style={{gridColumn:'span 2'}}><label className="label">Notes</label><input className="input" value={form.notes} onChange={F('notes')} placeholder="Additional notes"/></div>
        </div>
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:14,marginBottom:12,cursor:'pointer'}}>
          <input type="checkbox" checked={form.is_active} onChange={e=>setForm(f=>({...f,is_active:e.target.checked}))}/>
          Active medication
        </label>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary" type="submit" disabled={saving}>{saving?<Spinner/>:'Save'}</button>
          <button className="btn btn-secondary" type="button" onClick={onCancel}>Cancel</button>
        </div>
      </form>
    </div>
  );
}

function HistoryEntryForm({token,patient,entryType,entry,onSave,onCancel}){
  const toast=useToast();
  const [form,setForm]=useState({
    description:entry?.description||'',
    detail:entry?.detail||'',
    onset_date:entry?.onset_date||'',
    status:entry?.status||'active',
    notes:entry?.notes||''
  });
  const [saving,setSaving]=useState(false);
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const DETAIL_LABEL={
    allergy:'Reaction / Severity',
    family:'Relationship (e.g. Father)',
    surgical:'Surgeon / Outcome',
    problem:'Severity / Stage',
    social:'Details',
    immunization:'Lot # / Site',
  };

  const submit=async e=>{
    e.preventDefault();
    if(!form.description.trim()){toast('Description is required','error');return;}
    setSaving(true);
    try{
      let d;
      if(entry){d=await api('PUT',`/api/history/${entry.id}`,form,token);}
      else{d=await api('POST',`/api/patients/${patient.id}/history`,{...form,entry_type:entryType},token);}
      if(d)onSave(d);
    }catch(err){toast(err.message,'error');}
    setSaving(false);
  };

  return(
    <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:10,padding:16,marginBottom:12}}>
      <form onSubmit={submit}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div style={{gridColumn:'span 2'}}>
            <label className="label">Description *</label>
            <input className="input" value={form.description} onChange={F('description')} placeholder={
              entryType==='allergy'?'e.g. Penicillin':
              entryType==='problem'?'e.g. Type 2 Diabetes':
              entryType==='surgical'?'e.g. Appendectomy':
              entryType==='family'?'e.g. Heart disease':
              entryType==='social'?'e.g. Smokes 1 PPD':
              'e.g. COVID-19 vaccine'
            }/>
          </div>
          <div>
            <label className="label">{DETAIL_LABEL[entryType]||'Detail'}</label>
            <input className="input" value={form.detail} onChange={F('detail')} placeholder="Optional detail"/>
          </div>
          <div>
            <label className="label">{entryType==='immunization'?'Date':'Onset / Date'}</label>
            <input className="input" type="date" value={form.onset_date} onChange={F('onset_date')}/>
          </div>
          {entryType!=='social'&&entryType!=='immunization'&&(
            <div>
              <label className="label">Status</label>
              <select className="input" value={form.status} onChange={F('status')}>
                <option value="active">Active</option>
                <option value="resolved">Resolved</option>
                <option value="inactive">Inactive</option>
              </select>

// Load the correct Square SDK (sandbox vs production) dynamically
async function loadSquareSDK(sdkUrl){
  if(window.Square) return;
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=sdkUrl; s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });
}

// Initialize a Square card element and attach it to a DOM node
async function initSquareCard(appId,locationId,containerEl){
  const payments=Square.payments(appId,locationId);
  const card=await payments.card({
    style:{
      '.input-container':{borderColor:'#e2e8f0',borderRadius:'8px'},
      '.input-container.is-focus':{borderColor:'#006aff'},
      input:{fontSize:'15px',color:'#374151'},
    }
  });
  await card.attach(containerEl);
  return card;
}

// SQUARE PAYMENT MODAL  (one-time card charge)
// ═══════════════════════════════════════════════════════════════════════════════
function SquarePaymentModal({token,patient,onClose,onSave}){
  const toast=useToast();
  const [sqConfig,setSqConfig]=useState(null);
  const [amount,setAmount]=useState('');
  const [description,setDescription]=useState('');
  const [loading,setLoading]=useState(false);
  const [step,setStep]=useState('form'); // form | card | done
  const cardRef=useRef(null);
  const containerRef=useRef(null);

  useEffect(()=>{
    api('GET','/api/square/config',null,token).then(async d=>{
      if(!d?.enabled){toast('Square not configured — add SQUARE_ACCESS_TOKEN, SQUARE_APP_ID, SQUARE_LOCATION_ID to Railway env vars','error');return;}
      setSqConfig(d);
    });
  },[token]);

  // When we transition to card step, load SDK and mount card element
  useEffect(()=>{
    if(step!=='card'||!sqConfig||!containerRef.current||cardRef.current) return;
    (async()=>{
      try{
        await loadSquareSDK(sqConfig.sdk_url);
        cardRef.current=await initSquareCard(sqConfig.app_id,sqConfig.location_id,containerRef.current);
      }catch(e){toast('Failed to load card form: '+e.message,'error');}
    })();
    return()=>{if(cardRef.current){try{cardRef.current.destroy();}catch(_){}cardRef.current=null;}};
  },[step,sqConfig]);

  const proceedToCard=e=>{
    e.preventDefault();
    if(!amount||parseFloat(amount)<=0){toast('Enter a valid amount','error');return;}
    setStep('card');
  };

  const processPayment=async()=>{
    if(!cardRef.current){toast('Card form not ready','error');return;}
    setLoading(true);
    try{
      const result=await cardRef.current.tokenize();
      if(result.status!=='OK'){
        toast((result.errors||[]).map(e=>e.message).join(', ')||'Card tokenization failed','error');
        setLoading(false); return;
      }
      const d=await api('POST','/api/square/payment',{
        patient_id:patient.id, amount:parseFloat(amount), description, source_id:result.token
      },token);
      if(d?.success){
        setStep('done');
        toast('Payment successful!');
        onSave({id:d.payment_id,amount:parseFloat(amount),description,status:'completed',payment_method:'square',created_at:new Date().toISOString()});
      }
    }catch(e){toast(e.message,'error');}
    setLoading(false);
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'24px 28px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <h2 style={{fontWeight:700,fontSize:18,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:22}}>💳</span> Card Payment (Square)
            </h2>
            <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#94a3b8',lineHeight:1}}>✕</button>
          </div>

          {step==='form'&&(
            <form onSubmit={proceedToCard}>
              <div style={{marginBottom:14}}>
                <label className="label">Patient</label>
                <div style={{padding:'9px 12px',background:'#f8fafc',borderRadius:8,fontSize:14}}>{patient.first_name} {patient.last_name}</div>
              </div>
              <div style={{marginBottom:14}}>
                <label className="label">Amount (USD) *</label>
                <input className="input" type="number" step="0.01" min="0.01" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" required autoFocus/>
              </div>
              <div style={{marginBottom:20}}>
                <label className="label">Description</label>
                <input className="input" value={description} onChange={e=>setDescription(e.target.value)} placeholder="e.g. Office visit, copay, lab fee"/>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn" type="submit" style={{flex:1,background:'#006aff',color:'#fff'}}>
                  Continue to Card Entry →
                </button>
                <button className="btn btn-secondary" type="button" onClick={onClose}>Cancel</button>
              </div>
            </form>
          )}

          {step==='card'&&(
            <div>
              <div style={{marginBottom:16,padding:'12px 16px',background:'#e8f0fe',borderRadius:8,border:'1px solid #bfdbfe'}}>
                <div style={{fontSize:11,color:'#006aff',fontWeight:600,marginBottom:2}}>CHARGING</div>
                <div style={{fontWeight:800,fontSize:22,color:'#1d4ed8'}}>${parseFloat(amount).toFixed(2)}</div>
                {description&&<div style={{fontSize:13,color:'#64748b',marginTop:2}}>{description}</div>}
              </div>
              <div style={{marginBottom:16}}>
                <label className="label">Card Details</label>
                <div ref={containerRef} style={{minHeight:48,padding:'4px 0'}}/>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn" onClick={processPayment} disabled={loading} style={{flex:1,background:'#006aff',color:'#fff'}}>
                  {loading?<Spinner/>:`Pay $${parseFloat(amount).toFixed(2)}`}
                </button>
                <button className="btn btn-secondary" onClick={()=>{setStep('form');if(cardRef.current){try{cardRef.current.destroy();}catch(_){}cardRef.current=null;}}}>Back</button>
              </div>
              <div style={{marginTop:12,textAlign:'center',fontSize:11,color:'#94a3b8'}}>
                🔒 Secured by Square — card numbers never touch our server
              </div>
            </div>
          )}

          {step==='done'&&(
            <div style={{textAlign:'center',padding:'24px 0'}}>
              <div style={{fontSize:52,marginBottom:12}}>✅</div>
              <div style={{fontWeight:700,fontSize:20,color:'#16a34a',marginBottom:8}}>Payment Successful!</div>
              <div style={{color:'#64748b',marginBottom:20}}>${parseFloat(amount).toFixed(2)} collected via Square</div>
              <button className="btn btn-success" onClick={onClose}>Done</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ZAPRITE MODAL  (Bitcoin / Lightning / crypto payment via hosted checkout)
// ═══════════════════════════════════════════════════════════════════════════════
function ZapritePaymentModal({token,patient,onClose,onSave}){
  const toast=useToast();
  const [amount,setAmount]=useState('');
  const [description,setDescription]=useState('');
  const [loading,setLoading]=useState(false);
  const [step,setStep]=useState('form'); // form | waiting | done | failed
  const [orderId,setOrderId]=useState(null);
  const [checkoutUrl,setCheckoutUrl]=useState(null);
  const [statusMsg,setStatusMsg]=useState('Waiting for payment...');
  const pollRef=useRef(null);

  // Stop polling on unmount
  useEffect(()=>()=>{if(pollRef.current)clearInterval(pollRef.current);},[]);

  const createOrder=async e=>{
    e.preventDefault();
    if(!amount||parseFloat(amount)<=0){toast('Enter a valid amount','error');return;}
    setLoading(true);
    try{
      const d=await api('POST','/api/zaprite/order',{
        patient_id:patient.id,
        amount:parseFloat(amount),
        description:description||'Medical payment'
      },token);
      if(d?.checkout_url){
        setOrderId(d.order_id);
        setCheckoutUrl(d.checkout_url);
        setStep('waiting');
        window.open(d.checkout_url,'_blank','noopener,noreferrer');
        pollRef.current=setInterval(()=>pollStatus(d.order_id),10000);
      }else{
        toast('Failed to create order','error');
      }
    }catch(e){toast(e.message,'error');}
    setLoading(false);
  };

  const pollStatus=async(id)=>{
    try{
      const d=await api('GET',`/api/zaprite/order/${id}/status`,null,token);
      if(!d) return;
      if(d.status==='completed'){
        clearInterval(pollRef.current);
        setStep('done');
        toast('Crypto payment confirmed!');
        onSave({
          id:d.payment_id,
          amount:parseFloat(amount),
          description:description||'Medical payment',
          status:'completed',
          payment_method:'crypto',
          created_at:new Date().toISOString()
        });
      }else if(d.status==='failed'){
        clearInterval(pollRef.current);
        setStep('failed');
        setStatusMsg('Order abandoned — no payment received.');
      }else{
        const labels={PENDING:'Waiting for payment...',PROCESSING:'Payment detected, confirming...',UNDERPAID:'Partial payment received — waiting for remainder...'};
        setStatusMsg(labels[d.zaprite_status]||'Waiting for payment...');
      }
    }catch(_){}
  };

  const openAgain=()=>{ if(checkoutUrl) window.open(checkoutUrl,'_blank','noopener,noreferrer'); };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'24px 28px'}}>
          {/* Header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>

              Crypto Payment (Zaprite)
            </h2>
            <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#94a3b8',lineHeight:1}}>✕</button>
          </div>

          {/* Step: form */}
          {step==='form'&&(
            <form onSubmit={createOrder}>
              <div style={{marginBottom:14}}>
                <label className="label">Patient</label>
                <div style={{padding:'9px 12px',background:'#f8fafc',borderRadius:8,fontSize:14,color:'#374151',border:'1px solid #e2e8f0'}}>
                  {patient.first_name} {patient.last_name}
                </div>
              </div>
              <div style={{marginBottom:14}}>
                <label className="label">Amount (USD) *</label>
                <input className="input" type="number" step="0.01" min="0.01" value={amount}
                  onChange={e=>setAmount(e.target.value)} placeholder="0.00" required/>
              </div>
              <div style={{marginBottom:20}}>
                <label className="label">Description</label>
                <input className="input" value={description} onChange={e=>setDescription(e.target.value)}
                  placeholder="e.g. Office visit, Lab fee"/>
              </div>
              <div style={{background:'#fff7ed',borderRadius:10,padding:'12px 14px',marginBottom:20,fontSize:13,color:'#92400e'}}>
                <strong>How it works:</strong> A Zaprite checkout page opens in a new tab. The patient can pay with Bitcoin (on-chain or Lightning), USDT, USDC, and more. This page updates automatically when payment is confirmed.
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary" style={{background:'#f7931a',flex:1}} type="submit" disabled={loading}>
                  {loading?<Spinner/>:<><span style={{fontSize:14}}>⚡</span> Create Zaprite Order</>}
                </button>
                <button className="btn btn-secondary" type="button" onClick={onClose}>Cancel</button>
              </div>
              <div style={{marginTop:10,textAlign:'center',fontSize:11,color:'#94a3b8'}}>
                🔒 Powered by Zaprite · Bitcoin &amp; Lightning supported
              </div>
            </form>
          )}

          {/* Step: waiting for payment */}
          {step==='waiting'&&(
            <div style={{textAlign:'center',padding:'12px 0'}}>
              <div style={{fontSize:48,marginBottom:12}}>⏳</div>
              <div style={{fontWeight:700,fontSize:16,color:'#1e293b',marginBottom:8}}>
                Zaprite Checkout Opened
              </div>
              <div style={{color:'#64748b',fontSize:14,marginBottom:16}}>{statusMsg}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:20,color:'#64748b',fontSize:13}}>
                <Spinner/> Checking payment status every 10 seconds…
              </div>
              <div style={{background:'#f8fafc',borderRadius:10,padding:'12px 14px',marginBottom:20,fontSize:13,color:'#475569',textAlign:'left'}}>
                <div style={{fontWeight:600,marginBottom:4}}>💡 Lightning payments confirm instantly.</div>

              </div>
              <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                <button className="btn btn-primary" style={{background:'#f7931a'}} onClick={openAgain}>
                  <span style={{fontSize:13}}>↗</span> Re-open Checkout
                </button>
                <button className="btn btn-secondary" onClick={onClose}>Close (keep waiting)</button>
              </div>
              <div style={{marginTop:12,fontSize:11,color:'#94a3b8'}}>
                Amount: <strong>${parseFloat(amount).toFixed(2)}</strong> · Order: {orderId?.slice(0,8)}…
              </div>

          )}

          {/* Step: confirmed */}
          {step==='done'&&(
            <div style={{textAlign:'center',padding:'24px 0'}}>
              <div style={{fontSize:52,marginBottom:12}}>✅</div>
              <div style={{fontWeight:700,fontSize:20,color:'#16a34a',marginBottom:8}}>Payment Confirmed!</div>
              <div style={{color:'#64748b',marginBottom:4}}>

              </div>
              <div style={{color:'#94a3b8',fontSize:13,marginBottom:20}}>
                {description||'Medical payment'} · Payment recorded in history
              </div>
              <button className="btn btn-success" onClick={onClose}>Done</button>
            </div>
          )}

          {/* Step: failed / abandoned */}
          {step==='failed'&&(
            <div style={{textAlign:'center',padding:'24px 0'}}>
              <div style={{fontSize:52,marginBottom:12}}>❌</div>
              <div style={{fontWeight:700,fontSize:20,color:'#dc2626',marginBottom:8}}>Payment Failed</div>
              <div style={{color:'#64748b',marginBottom:20}}>{statusMsg}</div>
              <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                <button className="btn btn-primary" style={{background:'#f7931a'}} onClick={()=>setStep('form')}>Try Again</button>
                <button className="btn btn-secondary" onClick={onClose}>Close</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

          <div><label className="label">Method</label><select className="input" value={form.payment_method} onChange={s('payment_method')}><option value="card">Credit Card</option><option value="cash">Cash</option><option value="check">Check</option><option value="ach">ACH</option></select></div>
          <div style={{gridColumn:'span 2'}}><label className="label">Description</label><input className="input" value={form.description} onChange={s('description')} placeholder="e.g. Office visit copay, Monthly membership"/></div>
        </div>
        <div style={{display:'flex',gap:8}}><button className="btn btn-primary" type="submit" disabled={saving}>{saving?<Spinner/>:'Record Payment'}</button><button className="btn btn-secondary" type="button" onClick={onCancel}>Cancel</button></div>
      </form>
    </div>
  );
}

// FAX CENTER  (global view)
// ═══════════════════════════════════════════════════════════════════════════════
function FaxCenter({token}){
  const toast=useToast();
  const [faxes,setFaxes]=useState([]);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({to_number:'',subject:'',pages:1,notes:''});
  const [saving,setSaving]=useState(false);

  useEffect(()=>{api('GET','/api/faxes',null,token).then(d=>d&&setFaxes(d));},[token]);

  const send=async e=>{e.preventDefault();setSaving(true);
    try{const d=await api('POST','/api/faxes/send',form,token);if(d){toast('Fax queued');setFaxes([d,...faxes]);setShowForm(false);}}
    catch(e){toast(e.message,'error');}setSaving(false);};

  const statusBadge=s=>{const m={sent:'badge-green',received:'badge-blue',queued:'badge-yellow',failed:'badge-red'};return<span className={`badge ${m[s]||'badge-gray'}`}>{s}</span>;};

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b'}}>Fax Center</h1>
        <button className="btn btn-primary" onClick={()=>setShowForm(true)}><Icon name="send" size={15}/>Send Fax</button>
      </div>
      {showForm&&(
        <div className="card" style={{marginBottom:16,border:'2px solid #2563eb'}}>
          <h3 style={{fontWeight:700,marginBottom:12}}>Compose Fax</h3>
          <form onSubmit={send}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div><label className="label">To Fax # *</label><input className="input" value={form.to_number} onChange={e=>setForm({...form,to_number:e.target.value})} placeholder="+15551234567" required/></div>
              <div><label className="label">Pages</label><input className="input" type="number" min={1} value={form.pages} onChange={e=>setForm({...form,pages:e.target.value})}/></div>
              <div style={{gridColumn:'span 2'}}><label className="label">Subject</label><input className="input" value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})}/></div>
              <div style={{gridColumn:'span 2'}}><label className="label">Cover Sheet Notes</label><textarea className="input" rows={3} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/></div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" type="submit" disabled={saving}>{saving?<Spinner/>:<><Icon name="send" size={14}/>Send</>}</button>
              <button className="btn btn-secondary" type="button" onClick={()=>setShowForm(false)}>Cancel</button>
            </div>
          </form>
        </div>
      )}
      <div className="card">
        {faxes.length===0?<div style={{textAlign:'center',color:'#94a3b8',padding:40}}>No faxes yet</div>:faxes.map(f=>(
          <div key={f.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid #f1f5f9',flexWrap:'wrap',gap:8}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:8,background:f.direction==='sent'?'#dbeafe':'#dcfce7',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name={f.direction==='sent'?'send':'fax'} size={16}/>
              </div>
              <div>
                <div style={{fontWeight:500,fontSize:14}}>{f.subject||'(no subject)'}</div>
                <div style={{fontSize:12,color:'#94a3b8'}}>{f.direction==='sent'?'To':'From'}: {f.direction==='sent'?f.to_number:f.from_number} · {f.pages}pp · {f.created_at?.slice(0,10)}</div>
              </div>
            </div>
            {statusBadge(f.status)}
          </div>
        ))}
      </div>
    </div>
  );
}

// SETTINGS  (admin: user mgmt + audit log)

function Settings({token,user}){

  const [logs,setLogs]=useState([]);

  const [pwSaving,setPwSaving]=useState(false);

  useEffect(()=>{
    if(user.role==='admin'){
      api('GET','/api/users',null,token).then(d=>d&&setUsers(d));
      api('GET','/api/audit-logs',null,token).then(d=>d&&setLogs(d));

    try{await api('PUT','/api/auth/me/password',{current_password:pwForm.current_password,new_password:pwForm.new_password},token);toast('Password changed');setPwForm({current_password:'',new_password:'',confirm:''});}

      <div style={{display:'flex',gap:0,borderBottom:'2px solid #e2e8f0',marginBottom:16}}>
        {user.role==='admin'&&<button className={`tab${tab==='users'?' active':''}`} onClick={()=>setTab('users')}>Users</button>}
