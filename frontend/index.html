        <button className={`tab${tab==='profile'?' active':''}`} onClick={()=>setTab('profile')}>My Profile</button>
      </div>

      {tab==='users'&&user.role==='admin'&&(
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>setShowForm(true)}><Icon name="plus" size={15}/>Add User</button>
          </div>
          {showForm&&(
            <div className="card" style={{marginBottom:16,border:'2px solid #2563eb'}}>
              <h3 style={{fontWeight:700,marginBottom:12}}>New User</h3>
              <form onSubmit={createUser}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                  {[['Username','username'],['Full Name','full_name'],['Email','email'],['NPI Number','npi_number'],['Specialty','specialty']].map(([l,k])=>(
                    <div key={k}><label className="label">{l}</label><input className="input" value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} required={k==='username'}/></div>
                  ))}
                  <div><label className="label">Role</label><select className="input" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}><option value="physician">Physician</option><option value="staff">Staff</option><option value="admin">Admin</option></select></div>
                  <div><label className="label">Password *</label><input className="input" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/></div>
                </div>
                <div style={{display:'flex',gap:8}}><button className="btn btn-primary" type="submit" disabled={saving}>{saving?<Spinner/>:'Create User'}</button><button className="btn btn-secondary" type="button" onClick={()=>setShowForm(false)}>Cancel</button></div>
              </form>
            </div>
          )}
          <div className="card">
            {users.map(u=>(
              <div key={u.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid #f1f5f9',flexWrap:'wrap',gap:8}}>
                <div>
                  <div style={{fontWeight:500}}>{u.full_name} <span style={{fontSize:12,color:'#94a3b8'}}>@{u.username}</span></div>
                  <div style={{fontSize:13,color:'#64748b'}}>{u.specialty} · NPI: {u.npi_number||'—'}</div>
                  <span className={`badge ${u.role==='admin'?'badge-red':u.role==='physician'?'badge-blue':'badge-gray'}`}>{u.role}</span>
                </div>

                  {u.is_active?'Disable':'Enable'}

      {tab==='audit'&&user.role==='admin'&&(
        <div className="card" style={{overflowX:'auto'}}>
          <h3 style={{fontWeight:600,marginBottom:12}}>HIPAA Audit Log (last 500 events)</h3>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{borderBottom:'2px solid #e2e8f0'}}>
              {['Timestamp','User','Action','Resource','Details'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',color:'#475569',fontWeight:600}}>{h}</th>)}
            </tr></thead>
            <tbody>{logs.map(l=>(
              <tr key={l.id} className="table-row" style={{borderBottom:'1px solid #f1f5f9'}}>
                <td style={{padding:'8px 10px',whiteSpace:'nowrap',color:'#64748b'}}>{l.timestamp?.slice(0,19).replace('T',' ')}</td>
                <td style={{padding:'8px 10px'}}>{l.user_id}</td>
                <td style={{padding:'8px 10px'}}><span className="badge badge-blue">{l.action}</span></td>
                <td style={{padding:'8px 10px'}}>{l.resource_type} #{l.resource_id}</td>
                <td style={{padding:'8px 10px',color:'#94a3b8',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.details}</td>
              </tr>

      {tab==='profile'&&(
        <div className="card" style={{maxWidth:480}}>
          <h3 style={{fontWeight:600,marginBottom:4}}>Change Password</h3>

          <form onSubmit={changePw}>
            {[['Current Password','current_password'],['New Password','new_password'],['Confirm New Password','confirm']].map(([l,k])=>(
              <div key={k} style={{marginBottom:12}}>
                <label className="label">{l}</label>
                <input className="input" type="password" value={pwForm[k]} onChange={e=>setPwForm({...pwForm,[k]:e.target.value})} required/>
              </div>

            <button className="btn btn-primary" type="submit" disabled={pwSaving}>{pwSaving?<Spinner/>:'Update Password'}</button>
          </form>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCHEDULING MODULE
// ═══════════════════════════════════════════════════════════════════════════════

const PROVIDER_COLORS=['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777'];
const HOURS=Array.from({length:13},(_,i)=>i+7); // 7am–7pm
const PX_PER_MIN=1; // 1px per minute → 60px per hour
const DAY_START_MIN=7*60; // 7:00 AM in minutes

function fmtTime(dt){
  const d=new Date(dt);
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtDate(dt){
  return new Date(dt).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function dateKey(d){
  const dt=new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function getMonday(d){
  const dt=new Date(d); const day=dt.getDay();
  dt.setDate(dt.getDate()-day+(day===0?-6:1));
  dt.setHours(0,0,0,0); return dt;
}

// ── Month View ────────────────────────────────────────────────────────────────
function MonthView({currentDate,appointments,providers,getProviderColor,onDayClick,onApptClick,onNewAppt}){
  const year=currentDate.getFullYear(), month=currentDate.getMonth();
  const firstDay=new Date(year,month,1).getDay(); // 0=Sun
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayKey=dateKey(new Date());

  // Build 6×7 grid
  const cells=[];
  const offset=firstDay===0?6:firstDay-1; // shift to Mon start
  for(let i=0;i<42;i++){
    const dayNum=i-offset+1;
    if(dayNum<1||dayNum>daysInMonth){cells.push(null);continue;}
    const d=new Date(year,month,dayNum);
    cells.push(d);
  }

  const apptsByDay={};
  appointments.forEach(a=>{const k=dateKey(a.start_time);(apptsByDay[k]=apptsByDay[k]||[]).push(a);});

  const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return(
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid #e2e8f0'}}>
        {DAYS.map(d=><div key={d} style={{padding:'8px 0',textAlign:'center',fontSize:12,fontWeight:600,color:'#64748b'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
        {cells.map((d,i)=>{
          if(!d) return <div key={i} style={{minHeight:100,background:'#f8fafc',borderRight:'1px solid #f1f5f9',borderBottom:'1px solid #f1f5f9'}}/>;
          const k=dateKey(d); const dayAppts=(apptsByDay[k]||[]).sort((a,b)=>a.start_time.localeCompare(b.start_time));
          const isToday=k===todayKey;
          return(
            <div key={k} style={{minHeight:100,borderRight:'1px solid #f1f5f9',borderBottom:'1px solid #f1f5f9',padding:4,cursor:'pointer',background:isToday?'#eff6ff':'#fff'}}
              onClick={()=>onDayClick(d)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <span style={{fontSize:13,fontWeight:isToday?700:400,color:isToday?'#2563eb':'#374151',
                  background:isToday?'#2563eb':'transparent',color:isToday?'#fff':'#374151',
                  borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {d.getDate()}
                </span>
                <button style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:16,lineHeight:1,padding:'0 2px'}}
                  onClick={e=>{e.stopPropagation();onNewAppt({date:d});}}>+</button>
              </div>
              {dayAppts.slice(0,3).map(a=>(
                <div key={a.id} onClick={e=>{e.stopPropagation();onApptClick(a);}}
                  style={{fontSize:11,padding:'2px 5px',borderRadius:4,marginBottom:2,
                    background:a.color||getProviderColor(a.provider_id),color:'#fff',
                    overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',cursor:'pointer'}}>
                  {fmtTime(a.start_time)} {a.title}
                </div>
              ))}
              {dayAppts.length>3&&<div style={{fontSize:10,color:'#64748b',paddingLeft:4}}>+{dayAppts.length-3} more</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Week View ─────────────────────────────────────────────────────────────────
function WeekView({currentDate,appointments,providers,apptTypes,getProviderColor,onApptClick,onSlotClick}){
  const monday=getMonday(currentDate);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
  const todayKey=dateKey(new Date());

  const apptsByDay={};
  appointments.forEach(a=>{const k=dateKey(a.start_time);(apptsByDay[k]=apptsByDay[k]||[]).push(a);});

  const DAY_LABELS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return(
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      {/* Header row */}
      <div style={{display:'grid',gridTemplateColumns:'56px repeat(7,1fr)',borderBottom:'2px solid #e2e8f0',background:'#f8fafc'}}>
        <div/>
        {days.map((d,i)=>{
          const k=dateKey(d); const isToday=k===todayKey;
          return(
            <div key={k} style={{padding:'10px 4px',textAlign:'center',borderLeft:'1px solid #e2e8f0'}}>
              <div style={{fontSize:11,color:'#64748b',fontWeight:500}}>{DAY_LABELS[i]}</div>
              <div style={{fontSize:18,fontWeight:700,color:isToday?'#2563eb':'#1e293b',
                background:isToday?'#eff6ff':'transparent',borderRadius:6,display:'inline-block',padding:'2px 8px'}}>
                {d.getDate()}
              </div>
            </div>
          );
        })}
      </div>
      {/* Time grid */}
      <div style={{display:'flex',overflowY:'auto',maxHeight:640}}>
        {/* Hour labels */}
        <div style={{width:56,flexShrink:0,borderRight:'1px solid #e2e8f0'}}>
          {HOURS.map(h=>(
            <div key={h} style={{height:60,borderBottom:'1px solid #f1f5f9',padding:'2px 6px 0',fontSize:11,color:'#94a3b8',textAlign:'right'}}>
              {h===12?'12 PM':h<12?`${h} AM`:`${h-12} PM`}
            </div>
          ))}
        </div>
        {/* Day columns */}
        {days.map((d,di)=>{
          const k=dateKey(d);
          const dayAppts=(apptsByDay[k]||[]);
          return(
            <div key={k} style={{flex:1,borderLeft:'1px solid #e2e8f0',position:'relative',minHeight:780}}>
              {/* Hour slots (clickable) */}
              {HOURS.map(h=>(
                <div key={h} style={{height:60,borderBottom:'1px solid #f1f5f9',cursor:'pointer'}}
                  onClick={()=>onSlotClick(d,h)}/>
              ))}
              {/* Appointments */}
              {dayAppts.map(a=>{
                const start=new Date(a.start_time);
                const startMin=start.getHours()*60+start.getMinutes();
                const top=(startMin-DAY_START_MIN)*PX_PER_MIN;
                const height=Math.max(a.duration_minutes*PX_PER_MIN,22);
                if(top<0||top>720) return null;
                return(
                  <div key={a.id} onClick={e=>{e.stopPropagation();onApptClick(a);}}
                    style={{position:'absolute',left:2,right:2,top,height,
                      background:a.color||getProviderColor(a.provider_id),
                      borderRadius:5,padding:'2px 5px',cursor:'pointer',
                      overflow:'hidden',zIndex:1,boxShadow:'0 1px 3px rgba(0,0,0,.15)'}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#fff',lineHeight:1.3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {a.title}
                    </div>
                    {height>30&&<div style={{fontSize:10,color:'rgba(255,255,255,.85)'}}>{fmtTime(a.start_time)} · {a.patient_name||''}</div>}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Day View ──────────────────────────────────────────────────────────────────
function DayView({currentDate,appointments,providers,apptTypes,getProviderColor,onApptClick,onSlotClick}){
  const todayKey=dateKey(currentDate);
  const dayAppts=appointments.filter(a=>dateKey(a.start_time)===todayKey)
    .sort((a,b)=>a.start_time.localeCompare(b.start_time));

  return(
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <div style={{display:'flex',overflowY:'auto',maxHeight:700}}>
        {/* Hour labels */}
        <div style={{width:64,flexShrink:0,borderRight:'1px solid #e2e8f0'}}>
          <div style={{height:40,borderBottom:'1px solid #e2e8f0'}}/>
          {HOURS.map(h=>(
            <div key={h} style={{height:60,borderBottom:'1px solid #f1f5f9',padding:'2px 8px 0',fontSize:12,color:'#94a3b8',textAlign:'right'}}>
              {h===12?'12 PM':h<12?`${h} AM`:`${h-12} PM`}
            </div>
          ))}
        </div>
        {/* Main column */}
        <div style={{flex:1,position:'relative'}}>
          {/* Provider headers */}
          <div style={{height:40,borderBottom:'2px solid #e2e8f0',display:'flex',alignItems:'center',padding:'0 12px',gap:8,flexWrap:'wrap'}}>
            {providers.map((p,i)=>(
              <span key={p.id} style={{fontSize:12,fontWeight:600,padding:'2px 8px',borderRadius:12,
                background:PROVIDER_COLORS[i%PROVIDER_COLORS.length],color:'#fff'}}>
                {p.full_name}
              </span>
            ))}
            {providers.length===0&&<span style={{fontSize:12,color:'#94a3b8'}}>No providers</span>}
          </div>
          {/* Hour slots */}
          <div style={{position:'relative',minHeight:780}}>
            {HOURS.map(h=>(
              <div key={h} style={{height:60,borderBottom:'1px solid #f1f5f9',cursor:'pointer'}}
                onClick={()=>onSlotClick(currentDate,h)}/>
            ))}
            {/* Appointments */}
            {dayAppts.map((a,idx)=>{
              const start=new Date(a.start_time);
              const startMin=start.getHours()*60+start.getMinutes();
              const top=(startMin-DAY_START_MIN)*PX_PER_MIN+40;
              const height=Math.max(a.duration_minutes*PX_PER_MIN,28);
              if(top<40) return null;
              return(
                <div key={a.id} onClick={e=>{e.stopPropagation();onApptClick(a);}}
                  style={{position:'absolute',left:4+idx*4,right:4,top,height,
                    background:a.color||getProviderColor(a.provider_id),
                    borderRadius:6,padding:'4px 8px',cursor:'pointer',zIndex:idx+1,
                    boxShadow:'0 2px 6px rgba(0,0,0,.15)'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#fff'}}>{a.title}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.9)'}}>{fmtTime(a.start_time)}–{fmtTime(a.end_time)}</div>
                  {height>50&&<div style={{fontSize:11,color:'rgba(255,255,255,.85)'}}>{a.patient_name||''}</div>}
                  {height>65&&<div style={{fontSize:11,color:'rgba(255,255,255,.8)'}}>{a.provider_name||''}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {/* Today's agenda list */}
      {dayAppts.length===0?(
        <div style={{textAlign:'center',padding:'32px',color:'#94a3b8',fontSize:14}}>No appointments scheduled · Click a time slot to add one</div>
      ):(
        <div style={{borderTop:'1px solid #e2e8f0',padding:'12px 16px'}}>
          <div style={{fontSize:12,fontWeight:600,color:'#64748b',marginBottom:8}}>AGENDA ({dayAppts.length})</div>
          {dayAppts.map(a=>(
            <div key={a.id} onClick={()=>onApptClick(a)}
              style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:8,cursor:'pointer',marginBottom:4,border:'1px solid #f1f5f9'}}
              onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
              onMouseLeave={e=>e.currentTarget.style.background=''}>
              <div style={{width:4,height:40,borderRadius:2,background:a.color||getProviderColor(a.provider_id),flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{a.title}</div>
                <div style={{fontSize:12,color:'#64748b'}}>{fmtTime(a.start_time)}–{fmtTime(a.end_time)} · {a.provider_name}</div>
                {a.patient_name&&<div style={{fontSize:12,color:'#94a3b8'}}>{a.patient_name}</div>}
              </div>
              <span className={`badge ${a.status==='completed'?'badge-green':a.status==='confirmed'?'badge-blue':a.status==='cancelled'?'badge-red':'badge-yellow'}`} style={{fontSize:11}}>
                {a.status}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Appointment Modal ─────────────────────────────────────────────────────────
function AppointmentModal({token,user,appointment,defaults,providers,apptTypes,patients,onClose,onSave,onDelete}){
  const toast=useToast();
  const isEdit=!!appointment;

  const defaultDate=defaults?.date?dateKey(defaults.date):(isEdit?appointment.start_time?.slice(0,10):dateKey(new Date()));
  const defaultHour=defaults?.hour||9;
  const defaultTime=`${String(defaultHour).padStart(2,'0')}:00`;
  const defaultProvider=defaults?.provider_id||(isEdit?appointment.provider_id:(providers[0]?.id||''));

  const [form,setForm]=useState({
    title:           isEdit?appointment.title:'',
    patient_id:      isEdit?appointment.patient_id:'',
    provider_id:     isEdit?appointment.provider_id:defaultProvider,
    appointment_type_id: isEdit?appointment.appointment_type_id:'',
    date:            defaultDate,
    start_time:      isEdit?new Date(appointment.start_time).toTimeString().slice(0,5):defaultTime,
    duration:        isEdit?appointment.duration_minutes:30,
    status:          isEdit?appointment.status:'scheduled',
    notes:           isEdit?appointment.notes:'',
  });
  const [saving,setSaving]=useState(false);
  const [patientSearch,setPatientSearch]=useState(isEdit?appointment.patient_name||'':'');
  const [showPatientList,setShowPatientList]=useState(false);

  const s=k=>v=>setForm(f=>({...f,[k]:v}));
  const sf=k=>e=>s(k)(e.target.value);

  // Auto-fill title and duration from appointment type
  useEffect(()=>{
    if(!form.appointment_type_id) return;
    const at=apptTypes.find(t=>t.id===parseInt(form.appointment_type_id));
    if(at){
      if(!form.title||apptTypes.some(t=>t.name===form.title)) setForm(f=>({...f,title:at.name,duration:at.duration_minutes}));
      else setForm(f=>({...f,duration:at.duration_minutes}));
    }
  },[form.appointment_type_id]);

  const filteredPatients=patients.filter(p=>{
    const q=patientSearch.toLowerCase();
    return `${p.first_name} ${p.last_name}`.toLowerCase().includes(q)||p.phone?.includes(q);
  }).slice(0,8);

  const submit=async e=>{
    e.preventDefault();
    if(!form.provider_id){toast('Please select a provider','error');return;}
    setSaving(true);
    try{
      const [h,m]=form.start_time.split(':').map(Number);
      const startDt=new Date(`${form.date}T${form.start_time}:00`);
      const endDt=new Date(startDt.getTime()+parseInt(form.duration)*60000);
      const payload={
        title:form.title||'Appointment',
        patient_id:form.patient_id||null,
        provider_id:parseInt(form.provider_id),
        appointment_type_id:form.appointment_type_id?parseInt(form.appointment_type_id):null,
        start_time:startDt.toISOString(),
        end_time:endDt.toISOString(),
        status:form.status,
        notes:form.notes,
      };
      const d=isEdit
        ?await api('PUT',`/api/appointments/${appointment.id}`,payload,token)
        :await api('POST','/api/appointments',payload,token);
      if(d) onSave(d);
    }catch(e){toast(e.message,'error');}
    setSaving(false);
  };

  const cancelAppt=async()=>{
    if(!confirm('Cancel this appointment?')) return;
    setSaving(true);
    try{
      await api('DELETE',`/api/appointments/${appointment.id}`,null,token);
      onDelete(appointment.id);
    }catch(e){toast(e.message,'error');}
    setSaving(false);
  };

  const STATUS_OPTIONS=['scheduled','confirmed','completed','no_show','cancelled'];

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'24px 28px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <h2 style={{fontWeight:700,fontSize:18,display:'flex',alignItems:'center',gap:8}}>
              <Icon name="calendar" size={20}/> {isEdit?'Edit Appointment':'New Appointment'}
            </h2>
            <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#94a3b8'}}>✕</button>
          </div>
          <form onSubmit={submit}>
            {/* Appointment type */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div style={{gridColumn:'span 2'}}>
                <label className="label">Appointment Type</label>
                <select className="input" value={form.appointment_type_id} onChange={sf('appointment_type_id')}>
                  <option value="">— No type —</option>
                  {apptTypes.map(t=><option key={t.id} value={t.id}>{t.name} ({t.duration_minutes} min)</option>)}
                </select>
              </div>
              <div style={{gridColumn:'span 2'}}>
                <label className="label">Title *</label>
                <input className="input" value={form.title} onChange={sf('title')} placeholder="e.g. Follow-up, Annual Physical" required/>
              </div>
            </div>
            {/* Patient */}
            <div style={{marginBottom:12,position:'relative'}}>
              <label className="label">Patient</label>
              <input className="input" value={patientSearch} onChange={e=>{setPatientSearch(e.target.value);setShowPatientList(true);if(!e.target.value)s('patient_id')('');}}
                onFocus={()=>setShowPatientList(true)} placeholder="Search patient name…" autoComplete="off"/>
              {showPatientList&&patientSearch&&filteredPatients.length>0&&(
                <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,zIndex:50,boxShadow:'0 4px 12px rgba(0,0,0,.1)',maxHeight:200,overflowY:'auto'}}>
                  {filteredPatients.map(p=>(
                    <div key={p.id} onClick={()=>{s('patient_id')(p.id);setPatientSearch(`${p.first_name} ${p.last_name}`);setShowPatientList(false);}}
                      style={{padding:'8px 12px',cursor:'pointer',fontSize:14,borderBottom:'1px solid #f1f5f9'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                      onMouseLeave={e=>e.currentTarget.style.background=''}>
                      {p.first_name} {p.last_name}
                      {p.dob&&<span style={{color:'#94a3b8',fontSize:12}}> · DOB {p.dob}</span>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {/* Provider + Status */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div>
                <label className="label">Provider *</label>
                <select className="input" value={form.provider_id} onChange={sf('provider_id')} required>
                  <option value="">Select provider</option>
                  {providers.map(p=><option key={p.id} value={p.id}>{p.full_name}</option>)}
                </select>
              </div>
              <div>
                <label className="label">Status</label>
                <select className="input" value={form.status} onChange={sf('status')}>
                  {STATUS_OPTIONS.map(s=><option key={s} value={s} style={{textTransform:'capitalize'}}>{s.replace('_',' ')}</option>)}
                </select>
              </div>
            </div>
            {/* Date + Time + Duration */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}}>
              <div>
                <label className="label">Date *</label>
                <input className="input" type="date" value={form.date} onChange={sf('date')} required/>
              </div>
              <div>
                <label className="label">Start Time *</label>
                <input className="input" type="time" value={form.start_time} onChange={sf('start_time')} required/>
              </div>
              <div>
                <label className="label">Duration (min)</label>
                <select className="input" value={form.duration} onChange={sf('duration')}>
                  {[15,20,30,45,60,90,120].map(m=><option key={m} value={m}>{m} min</option>)}
                </select>
              </div>
            </div>
            {/* Notes */}
            <div style={{marginBottom:20}}>
              <label className="label">Notes</label>
              <textarea className="input" rows={2} value={form.notes} onChange={sf('notes')} placeholder="Visit reason, special instructions…"/>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'space-between'}}>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary" type="submit" disabled={saving}>{saving?<Spinner/>:<><Icon name="check" size={15}/>{isEdit?'Save Changes':'Schedule'}</>}</button>
                <button className="btn btn-secondary" type="button" onClick={onClose}>Cancel</button>
              </div>
              {isEdit&&<button className="btn btn-danger" type="button" onClick={cancelAppt} disabled={saving}><Icon name="x" size={14}/>Cancel Appt</button>}
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ── Appointment Type Settings ─────────────────────────────────────────────────
function AppointmentTypeSettings({token,apptTypes,setApptTypes,providers}){
  const toast=useToast();
  const [form,setForm]=useState({name:'',duration_minutes:30,color:'#2563eb',description:''});
  const [editId,setEditId]=useState(null);
  const [saving,setSaving]=useState(false);
  const sf=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const save=async e=>{
    e.preventDefault(); setSaving(true);
    try{
      const d=editId
        ?await api('PUT',`/api/appointment-types/${editId}`,form,token)
        :await api('POST','/api/appointment-types',form,token);
      if(d){
        if(editId) setApptTypes(prev=>prev.map(t=>t.id===editId?d:t));
        else setApptTypes(prev=>[...prev,d]);
        setForm({name:'',duration_minutes:30,color:'#2563eb',description:''});
        setEditId(null);
        toast(editId?'Type updated':'Type created');
      }
    }catch(e){toast(e.message,'error');}
    setSaving(false);
  };

  const del=async(id)=>{
    await api('DELETE',`/api/appointment-types/${id}`,null,token);
    setApptTypes(prev=>prev.filter(t=>t.id!==id));
    toast('Removed');
  };

  const startEdit=t=>{setEditId(t.id);setForm({name:t.name,duration_minutes:t.duration_minutes,color:t.color,description:t.description||''});};

  return(
    <div className="card" style={{marginBottom:16,border:'2px solid #e2e8f0'}}>
      <h3 style={{fontWeight:700,fontSize:15,marginBottom:14}}>⚙️ Appointment Types</h3>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
        {apptTypes.map(t=>(
          <div key={t.id} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:8,background:'#f8fafc',border:'1px solid #e2e8f0'}}>
            <div style={{width:12,height:12,borderRadius:3,background:t.color,flexShrink:0}}/>
            <span style={{fontSize:13,fontWeight:500}}>{t.name}</span>
            <span style={{fontSize:11,color:'#94a3b8'}}>{t.duration_minutes}m</span>
            <button onClick={()=>startEdit(t)} style={{background:'none',border:'none',cursor:'pointer',color:'#64748b',padding:0,fontSize:12}}>✏️</button>
            <button onClick={()=>del(t.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',padding:0,fontSize:12}}>✕</button>
          </div>
        ))}
        {apptTypes.length===0&&<span style={{fontSize:13,color:'#94a3b8'}}>No types yet — add one below</span>}
      </div>
      <form onSubmit={save}>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto auto 2fr auto',gap:8,alignItems:'end'}}>
          <div>
            <label className="label">Name *</label>
            <input className="input" value={form.name} onChange={sf('name')} placeholder="e.g. New Patient" required/>
          </div>
          <div>
            <label className="label">Duration</label>
            <select className="input" value={form.duration_minutes} onChange={sf('duration_minutes')}>
              {[15,20,30,45,60,90,120].map(m=><option key={m} value={m}>{m} min</option>)}
            </select>
          </div>
          <div>
            <label className="label">Color</label>
            <input type="color" value={form.color} onChange={sf('color')} style={{width:44,height:38,border:'1px solid #e2e8f0',borderRadius:8,padding:2,cursor:'pointer'}}/>
          </div>
          <div>
            <label className="label">Description</label>
            <input className="input" value={form.description} onChange={sf('description')} placeholder="Optional"/>
          </div>
          <div>
            <label className="label">&nbsp;</label>
            <button className="btn btn-primary" type="submit" disabled={saving}>{saving?<Spinner/>:editId?'Update':'Add'}</button>
          </div>
        </div>
        {editId&&<button type="button" className="btn btn-secondary" style={{marginTop:8}} onClick={()=>{setEditId(null);setForm({name:'',duration_minutes:30,color:'#2563eb',description:''});}}>Cancel edit</button>}
      </form>
    </div>
  );
}

// ── Schedule Module (main container) ─────────────────────────────────────────
function ScheduleModule({token,user}){
  const toast=useToast();
  const [view,setView]=useState('week');
  const [currentDate,setCurrentDate]=useState(new Date());
  const [appointments,setAppointments]=useState([]);
  const [providers,setProviders]=useState([]);
  const [apptTypes,setApptTypes]=useState([]);
  const [patients,setPatients]=useState([]);
  const [selectedProvider,setSelectedProvider]=useState('all');
  const [selectedAppt,setSelectedAppt]=useState(null);
  const [showModal,setShowModal]=useState(false);
  const [newDefaults,setNewDefaults]=useState(null);
  const [showSettings,setShowSettings]=useState(false);

  const getProviderColor=useCallback(pid=>{
    const idx=providers.findIndex(p=>p.id===pid);
    return PROVIDER_COLORS[idx%PROVIDER_COLORS.length]||'#2563eb';
  },[providers]);

  const loadAppointments=useCallback(async()=>{
    let start,end;
    const d=new Date(currentDate);
    if(view==='day'){
      start=new Date(d.getFullYear(),d.getMonth(),d.getDate());
      end=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1);
    }else if(view==='week'){
      start=getMonday(d);
      end=new Date(start); end.setDate(start.getDate()+7);
    }else{
      start=new Date(d.getFullYear(),d.getMonth(),1);
      end=new Date(d.getFullYear(),d.getMonth()+1,1);
    }
    let url=`/api/appointments?start=${start.toISOString()}&end=${end.toISOString()}`;
    if(selectedProvider!=='all') url+=`&provider_id=${selectedProvider}`;
    const data=await api('GET',url,null,token);
    if(data) setAppointments(data);
  },[currentDate,view,selectedProvider,token]);

  useEffect(()=>{
    api('GET','/api/providers',null,token).then(d=>d&&setProviders(d));
    api('GET','/api/appointment-types',null,token).then(d=>d&&setApptTypes(d));
    api('GET','/api/patients',null,token).then(d=>d&&setPatients(d));
  },[token]);

  useEffect(()=>{loadAppointments();},[loadAppointments]);

  const navigate=dir=>{
    const d=new Date(currentDate);
    if(view==='day') d.setDate(d.getDate()+dir);
    else if(view==='week') d.setDate(d.getDate()+dir*7);
    else d.setMonth(d.getMonth()+dir);
    setCurrentDate(d);
  };

  const rangeLabel=()=>{
    const d=currentDate;
    if(view==='day') return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    if(view==='week'){
      const mon=getMonday(d); const sun=new Date(mon); sun.setDate(mon.getDate()+6);
      return `${mon.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${sun.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
    }
    return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  };

  const openNew=(defaults={})=>{setSelectedAppt(null);setNewDefaults(defaults);setShowModal(true);};
  const openEdit=(appt)=>{setSelectedAppt(appt);setNewDefaults(null);setShowModal(true);};

  return(
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b'}}>Schedule</h1>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select className="input" style={{width:'auto',fontSize:13,padding:'7px 10px'}} value={selectedProvider} onChange={e=>setSelectedProvider(e.target.value)}>
            <option value="all">All Providers</option>
            {providers.map(p=><option key={p.id} value={p.id}>{p.full_name}</option>)}
          </select>
          <div style={{display:'flex',border:'1px solid #e2e8f0',borderRadius:8,overflow:'hidden'}}>
            {['day','week','month'].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{padding:'7px 14px',fontSize:13,fontWeight:500,
                background:view===v?'#2563eb':'#fff',color:view===v?'#fff':'#475569',border:'none',cursor:'pointer',textTransform:'capitalize'}}>
                {v}
              </button>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <button className="btn btn-outline" style={{padding:'6px 12px'}} onClick={()=>navigate(-1)}>‹</button>
            <button className="btn btn-outline" style={{padding:'6px 12px',fontSize:13}} onClick={()=>setCurrentDate(new Date())}>Today</button>
            <button className="btn btn-outline" style={{padding:'6px 12px'}} onClick={()=>navigate(1)}>›</button>
          </div>
          <span style={{fontSize:14,fontWeight:600,color:'#1e293b'}}>{rangeLabel()}</span>
          <button className="btn btn-primary" onClick={()=>openNew()}><Icon name="plus" size={15}/>New Appointment</button>
          <button className="btn btn-outline" style={{padding:'7px 10px'}} onClick={()=>setShowSettings(s=>!s)} title="Manage appointment types"><Icon name="settings" size={15}/></button>
        </div>
      </div>

      {showSettings&&<AppointmentTypeSettings token={token} apptTypes={apptTypes} setApptTypes={setApptTypes} providers={providers}/>}

      {view==='month'&&<MonthView currentDate={currentDate} appointments={appointments} providers={providers} getProviderColor={getProviderColor} onDayClick={d=>{setCurrentDate(d);setView('day');}} onApptClick={openEdit} onNewAppt={openNew}/>}
      {view==='week'&&<WeekView currentDate={currentDate} appointments={appointments} providers={providers} apptTypes={apptTypes} getProviderColor={getProviderColor} onApptClick={openEdit} onSlotClick={(d,h)=>openNew({date:d,hour:h})}/>}
      {view==='day'&&<DayView currentDate={currentDate} appointments={appointments} providers={providers} apptTypes={apptTypes} getProviderColor={getProviderColor} onApptClick={openEdit} onSlotClick={(d,h)=>openNew({date:d,hour:h})}/>}

      {showModal&&<AppointmentModal token={token} user={user} appointment={selectedAppt} defaults={newDefaults}
        providers={providers} apptTypes={apptTypes} patients={patients}
        onClose={()=>setShowModal(false)}
        onSave={appt=>{setShowModal(false);toast(selectedAppt?'Appointment updated':'Appointment booked!');loadAppointments();}}
        onDelete={()=>{setShowModal(false);toast('Appointment cancelled');loadAppointments();}}
      />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SIDEBAR + MAIN LAYOUT
// ═══════════════════════════════════════════════════════════════════════════════
// ENROLLMENT MANAGER
// ═══════════════════════════════════════════════════════════════════════════════
function EnrollmentManager({token}){
  const toast=useToast();
  const [tab,setTab]=useState('applications');
  const [applications,setApplications]=useState([]);
  const [plans,setPlans]=useState([]);
  const [loading,setLoading]=useState(false);
  const [statusFilter,setStatusFilter]=useState('');
  const [selected,setSelected]=useState(null);
  const [reviewNote,setReviewNote]=useState('');
  const [editPlan,setEditPlan]=useState(null);

  useEffect(()=>{
    if(tab==='applications') loadApplications();
    if(tab==='plans') loadPlans();
  },[tab,statusFilter]);

  const loadApplications=async()=>{
    setLoading(true);
    const url='/api/enrollment-applications'+(statusFilter?`?status=${statusFilter}`:'');
    const d=await api('GET',url,null,token).catch(()=>null);
    if(d)setApplications(d);
    setLoading(false);
  };

  const loadPlans=async()=>{
    const d=await api('GET','/api/membership-plans',null,token).catch(()=>null);
    if(d)setPlans(d);
  };

  const approve=async(id)=>{
    try{
      const d=await api('POST',`/api/enrollment-applications/${id}/approve`,{notes:reviewNote},token);
      if(d){toast(`✓ Enrollment approved — Patient #${d.patient_id} created`);setSelected(null);setReviewNote('');loadApplications();}
    }catch(e){toast(e.message,'error');}
  };

  const reject=async(id)=>{
    if(!confirm('Reject this enrollment application?'))return;
    try{
      await api('POST',`/api/enrollment-applications/${id}/reject`,{notes:reviewNote},token);
      toast('Enrollment rejected');setSelected(null);setReviewNote('');loadApplications();
    }catch(e){toast(e.message,'error');}
  };

  const savePlan=async(plan)=>{
    try{
      const d=await api('PUT',`/api/membership-plans/${plan.id}`,plan,token);
      if(d){setPlans(plans.map(p=>p.id===d.id?d:p));setEditPlan(null);toast('Plan updated');}
    }catch(e){toast(e.message,'error');}
  };

  const [billingRunning,setBillingRunning]=useState(false);
  const [billingResult,setBillingResult]=useState(null);
  const runBilling=async()=>{
    if(!confirm('Run monthly billing now? This will charge all members whose billing date is due.'))return;
    setBillingRunning(true);setBillingResult(null);
    try{
      const d=await api('POST','/api/admin/billing/run',{},token);
      setBillingResult(d.results);
      toast(`Billing complete — ${d.results.succeeded} charged, ${d.results.failed} failed, ${d.results.skipped} skipped`);
    }catch(e){toast('Billing error: '+e.message,'error');}
    setBillingRunning(false);
  };

  const STATUS_BADGE={
    pending:         {bg:'#fef9c3',color:'#92400e',label:'Pending'},
    payment_pending: {bg:'#dbeafe',color:'#1e40af',label:'Awaiting Payment'},
    active:          {bg:'#dcfce7',color:'#15803d',label:'Active'},
    rejected:        {bg:'#fee2e2',color:'#dc2626',label:'Rejected'},
    cancelled:       {bg:'#f1f5f9',color:'#64748b',label:'Cancelled'},
  };

  const enrollUrl=`${window.location.origin}/enroll`;

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b'}}>Enrollment</h1>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:13,color:'#64748b'}}>Patient Enrollment Link:</span>
          <a href={enrollUrl} target="_blank" style={{fontSize:13,color:'#2563eb',textDecoration:'none',
            background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:6,padding:'4px 10px'}}>
            {enrollUrl}
          </a>
          <button className="btn btn-outline" style={{fontSize:12}} onClick={()=>{navigator.clipboard.writeText(enrollUrl);toast('Link copied');}}>Copy</button>
        </div>
      </div>

      <div style={{display:'flex',gap:0,borderBottom:'2px solid #e2e8f0',marginBottom:16,alignItems:'flex-end',justifyContent:'space-between'}}>
        <div style={{display:'flex',gap:0}}>
          {['applications','plans','billing'].map(t=>(
            <button key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}
              style={{textTransform:'capitalize'}}>
              {t==='applications'?'Applications':t==='plans'?'Membership Plans':'Billing'}
            </button>
          ))}
        </div>
        <button className="btn btn-primary" style={{marginBottom:4,fontSize:13}} onClick={runBilling} disabled={billingRunning}>
          {billingRunning?'Running…':'💳 Run Billing Now'}
        </button>
      </div>

      {/* ── Applications tab ── */}
      {tab==='applications'&&(
        <div>
          <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}>
            <select className="input" style={{width:180}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
              <option value="">All statuses</option>
              {Object.entries(STATUS_BADGE).map(([k,v])=>(
                <option key={k} value={k}>{v.label}</option>
              ))}
            </select>
            <button className="btn btn-outline" onClick={loadApplications}>↻ Refresh</button>
            <span style={{marginLeft:'auto',fontSize:13,color:'#64748b'}}>{applications.length} application{applications.length!==1?'s':''}</span>
          </div>

          {selected&&(
            <div className="modal-overlay" onClick={()=>setSelected(null)}>
              <div className="modal" style={{maxWidth:620}} onClick={e=>e.stopPropagation()}>
                <div style={{padding:'24px 28px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                    <h2 style={{fontWeight:700,fontSize:17}}>Enrollment — {selected.first_name} {selected.last_name}</h2>
                    <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#94a3b8'}}>✕</button>
                  </div>

                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12,fontSize:13}}>
                    {[['Plan',selected.plan_name],['DOB',selected.dob],['Email',selected.email],['Phone',selected.phone],
                      ['Address',`${selected.address}, ${selected.city}, ${selected.state} ${selected.zip_code}`],
                      ['Emergency',`${selected.emergency_name} (${selected.emergency_relation}) ${selected.emergency_phone}`],
                      ['Payment',selected.payment_provider||'—'],['Status',selected.status],
                    ].map(([k,v])=>(
                      <div key={k}><span style={{color:'#64748b',fontWeight:500}}>{k}: </span>{v||'—'}</div>
                    ))}
                  </div>

                  {(selected.conditions?.length>0||selected.medications?.length>0||selected.allergies?.length>0)&&(
                    <div style={{background:'#f8fafc',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:13}}>
                      {selected.conditions?.length>0&&<div><b>Conditions:</b> {Array.isArray(selected.conditions)?selected.conditions.join(', '):selected.conditions}</div>}
                      {selected.medications?.length>0&&<div><b>Medications:</b> {Array.isArray(selected.medications)?selected.medications.join(', '):selected.medications}</div>}
                      {selected.allergies?.length>0&&<div><b>Allergies:</b> {Array.isArray(selected.allergies)?selected.allergies.join(', '):selected.allergies}</div>}
                    </div>
                  )}

                  <div style={{marginBottom:12,fontSize:13}}>
                    <b>Consents signed:</b>{' '}
                    {(Array.isArray(selected.consents)?selected.consents:[]).map(c=>(
                      <span key={c.type} style={{marginLeft:6,padding:'2px 8px',borderRadius:10,background:'#dcfce7',color:'#15803d',fontSize:11}}>✓ {c.type}</span>
                    ))}
                  </div>

                  <label className="label">Review Notes</label>
                  <textarea className="input" rows={2} value={reviewNote} onChange={e=>setReviewNote(e.target.value)}
                    placeholder="Optional notes..." style={{marginBottom:12}}/>

                  {selected.status==='pending'||selected.status==='payment_pending'?(
                    <div style={{display:'flex',gap:8}}>
                      <button className="btn btn-primary" onClick={()=>approve(selected.id)}>✓ Approve & Create Patient</button>
                      <button className="btn btn-outline" style={{color:'#dc2626',borderColor:'#dc2626'}} onClick={()=>reject(selected.id)}>✗ Reject</button>
                    </div>
                  ):(
                    <div style={{padding:'8px 12px',background:'#f1f5f9',borderRadius:8,fontSize:13,color:'#64748b'}}>
                      Status: {selected.status} · Reviewed: {selected.reviewed_at?.slice(0,10)||'—'}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {loading?<div style={{textAlign:'center',padding:40}}><Spinner/></div>:
            applications.length===0?<div className="card" style={{textAlign:'center',color:'#94a3b8',padding:40}}>No enrollment applications yet.<br/>Share your enrollment link with patients to get started.</div>:
            applications.map(a=>{
              const sb=STATUS_BADGE[a.status]||STATUS_BADGE.pending;
              return(
                <div key={a.id} className="card" style={{marginBottom:10,cursor:'pointer'}}
                  onClick={()=>{setSelected(a);setReviewNote('');}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:15}}>{a.first_name} {a.last_name}</div>
                      <div style={{fontSize:13,color:'#64748b'}}>
                        {a.plan_name} · {a.email} · {a.phone}
                        <span style={{marginLeft:8,color:'#94a3b8'}}>{a.created_at?.slice(0,10)}</span>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <span style={{fontSize:12,fontWeight:600,padding:'3px 10px',borderRadius:20,background:sb.bg,color:sb.color}}>{sb.label}</span>
                      {a.payment_provider&&<span style={{fontSize:11,color:'#94a3b8'}}>{a.payment_provider}</span>}
                    </div>
                  </div>
                </div>
              );
            })
          }
        </div>
      )}

      {/* ── Plans tab ── */}
      {tab==='plans'&&(
        <div>
          <div style={{marginBottom:12,fontSize:13,color:'#64748b'}}>
            Set monthly prices and features for each membership tier. These display on the public enrollment page.
          </div>
          {plans.map(plan=>(
            <div key={plan.id} className="card" style={{marginBottom:12,borderLeft:`4px solid ${plan.color||'#1e3a5f'}`}}>
              {editPlan?.id===plan.id?(
                <PlanEditor plan={editPlan} onChange={setEditPlan} onSave={()=>savePlan(editPlan)} onCancel={()=>setEditPlan(null)}/>
              ):(
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                      <span style={{fontWeight:700,fontSize:16}}>{plan.name}</span>
                      {plan.badge&&<span style={{fontSize:11,padding:'2px 8px',borderRadius:10,background:plan.color+'22',color:plan.color,fontWeight:600}}>{plan.badge}</span>}
                      {!plan.is_active&&<span style={{fontSize:11,color:'#94a3b8'}}>Inactive</span>}
                    </div>
                    <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>{plan.description}</div>
                    <div style={{fontSize:15,fontWeight:700,color:plan.color||'#1e3a5f',marginBottom:6}}>
                      {plan.price_monthly>0?`$${plan.price_monthly}/month`:'Price not set'}
                      {plan.enrollment_fee>0&&<span style={{fontSize:12,fontWeight:400,color:'#64748b',marginLeft:8}}> + ${plan.enrollment_fee} enrollment fee</span>}
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {(plan.features||[]).slice(0,4).map((f,i)=>(
                        <span key={i} style={{fontSize:11,color:'#475569',background:'#f1f5f9',padding:'2px 8px',borderRadius:6}}>✓ {f}</span>
                      ))}
                      {(plan.features||[]).length>4&&<span style={{fontSize:11,color:'#94a3b8'}}>+{(plan.features||[]).length-4} more</span>}
                    </div>
                  </div>
                  <button className="btn btn-outline" style={{fontSize:12}} onClick={()=>setEditPlan({...plan})}>Edit</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* ── Billing tab ── */}
      {tab==='billing'&&(
        <div>
          {billingResult&&(
            <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'12px 16px',marginBottom:16,display:'flex',gap:24,flexWrap:'wrap'}}>
              <span style={{fontWeight:600,color:'#15803d'}}>Last run results:</span>
              <span>✅ Charged: <b>{billingResult.succeeded}</b></span>
              <span>❌ Failed: <b style={{color:billingResult.failed>0?'#dc2626':'inherit'}}>{billingResult.failed}</b></span>
              <span>⏭ Skipped: <b>{billingResult.skipped}</b></span>
            </div>
          )}
          <BillingUpcoming token={token}/>
        </div>
      )}
    </div>
  );
}

function BillingUpcoming({token}){
  const toast=useToast();
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [days,setDays]=useState(7);
  useEffect(()=>{
    setLoading(true);
    api('GET',`/api/admin/billing/upcoming?days=${days}`,null,token)
      .then(d=>setRows(d||[]))
      .catch(()=>toast('Could not load upcoming billing','error'))
      .finally(()=>setLoading(false));
  },[days]);
  return(
    <div>
      <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:12}}>
        <span style={{fontWeight:600,fontSize:15}}>Upcoming Billing</span>
        <select className="input" style={{width:140}} value={days} onChange={e=>setDays(Number(e.target.value))}>
          <option value={7}>Next 7 days</option>
          <option value={14}>Next 14 days</option>
          <option value={30}>Next 30 days</option>
        </select>
      </div>
      {loading?<div style={{color:'#94a3b8',padding:20}}>Loading…</div>:
      rows.length===0?<div className="card" style={{textAlign:'center',color:'#94a3b8',padding:30}}>No billing due in this window</div>:
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:14}}>
        <thead><tr style={{borderBottom:'2px solid #e2e8f0',textAlign:'left'}}>
          <th style={{padding:'6px 10px'}}>Patient</th>
          <th style={{padding:'6px 10px'}}>Plan</th>
          <th style={{padding:'6px 10px'}}>Amount</th>
          <th style={{padding:'6px 10px'}}>Due Date</th>
          <th style={{padding:'6px 10px'}}>Provider</th>
          <th style={{padding:'6px 10px'}}>Status</th>
        </tr></thead>
        <tbody>{rows.map(r=>(
          <tr key={r.id} style={{borderBottom:'1px solid #f1f5f9'}}>
            <td style={{padding:'7px 10px'}}>{r.patient_name||'—'}</td>
            <td style={{padding:'7px 10px'}}>{r.plan_name}</td>
            <td style={{padding:'7px 10px'}}>${r.price_monthly?.toFixed(2)}/mo</td>
            <td style={{padding:'7px 10px'}}>{r.next_billing_date?.slice(0,10)}</td>
            <td style={{padding:'7px 10px',textTransform:'capitalize'}}>{r.payment_provider||'square'}</td>
            <td style={{padding:'7px 10px'}}>
              {r.billing_status==='past_due'&&<span style={{color:'#d97706',fontWeight:600}}>Past Due</span>}
              {r.billing_status==='suspended'&&<span style={{color:'#dc2626',fontWeight:600}}>Suspended</span>}
              {(!r.billing_status||r.billing_status==='ok')&&<span style={{color:'#16a34a'}}>OK</span>}
            </td>
          </tr>
        ))}</tbody>
      </table>}
    </div>
  );
}

function PlanEditor({plan,onChange,onSave,onCancel}){
  const setField=(k,v)=>onChange(prev=>({...prev,[k]:v}));
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12,marginBottom:12}}>
        <div>
          <label className="label">Monthly Price ($)</label>
          <input className="input" type="number" step="0.01" min="0" value={plan.price_monthly||''}
            onChange={e=>setField('price_monthly',parseFloat(e.target.value)||0)}/>
        </div>
        <div>
          <label className="label">Annual Price ($)</label>
          <input className="input" type="number" step="0.01" min="0" value={plan.price_annual||''}
            placeholder={plan.price_monthly?(plan.price_monthly*10).toFixed(2):''}
            onChange={e=>setField('price_annual',parseFloat(e.target.value)||null)}/>
          {plan.price_monthly>0&&plan.price_annual>0&&(
            <div style={{fontSize:11,color:'#16a34a',marginTop:3}}>
              Saves ${((plan.price_monthly*12)-plan.price_annual).toFixed(2)}/yr vs monthly
            </div>
          )}
        </div>
        <div>
          <label className="label">Enrollment Fee ($)</label>
          <input className="input" type="number" step="0.01" min="0" value={plan.enrollment_fee||''}
            onChange={e=>setField('enrollment_fee',parseFloat(e.target.value)||0)}/>
        </div>
        <div>
          <label className="label">Badge (optional)</label>
          <input className="input" value={plan.badge||''} placeholder="e.g. Most Popular"
            onChange={e=>setField('badge',e.target.value)}/>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <label className="label">Description</label>
        <input className="input" value={plan.description||''} onChange={e=>setField('description',e.target.value)}/>
      </div>
      <div style={{marginBottom:12}}>
        <label className="label">Square Plan ID (for subscriptions)</label>
        <input className="input" value={plan.square_plan_id||''} placeholder="From Square Dashboard"
          onChange={e=>setField('square_plan_id',e.target.value)}/>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <label className="label" style={{margin:0}}>Features</label>
          <button className="btn btn-outline" style={{fontSize:11}} onClick={()=>setField('features',[...(plan.features||[]),''])}>+ Add</button>
        </div>
        {(plan.features||[]).map((f,i)=>(
          <div key={i} style={{display:'flex',gap:6,marginBottom:6}}>
            <input className="input" value={f} onChange={e=>{const arr=[...(plan.features||[])];arr[i]=e.target.value;setField('features',arr);}}/>
            <button style={{background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:6,padding:'0 10px',cursor:'pointer'}}
              onClick={()=>setField('features',(plan.features||[]).filter((_,j)=>j!==i))}>✕</button>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button className="btn btn-primary" onClick={onSave}>Save Plan</button>
        <button className="btn btn-outline" onClick={onCancel}>Cancel</button>
        <label style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
          <input type="checkbox" checked={plan.is_active} onChange={e=>setField('is_active',e.target.checked)}/> Active
        </label>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'home'},
  {id:'patients',label:'Patients',icon:'users'},
  {id:'notes',label:'Clinical Notes',icon:'clipboard'},
  {id:'labs',label:'Lab Orders',icon:'lab'},
  {id:'imaging',label:'Imaging Orders',icon:'xray'},
  {id:'schedule',label:'Schedule',icon:'calendar'},
  {id:'fax',label:'Fax Center',icon:'fax'},
  {id:'memberships',label:'Memberships',icon:'star'},
  {id:'enrollment',label:'Enrollment',icon:'plus'},
  {id:'settings',label:'Settings',icon:'settings'},
];

function App(){
  const [token,setToken]=useState(()=>localStorage.getItem('mf_token'));
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('mf_user'));}catch{return null;}});
  const [page,setPage]=useState('dashboard');
  const [selectedPatient,setSelectedPatient]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const toast=useToast();

  useEffect(()=>{
    const h=()=>{setToken(null);setUser(null);localStorage.removeItem('mf_token');localStorage.removeItem('mf_user');};
    window.addEventListener('auth-expired',h);
    return()=>window.removeEventListener('auth-expired',h);
  },[]);

  useEffect(()=>{
    const navMap={
      'new-patient':()=>{setPage('patients');setSelectedPatient('new');},
      'new-note':()=>setPage('notes'),
      'lab-order':()=>setPage('labs'),
      'send-fax':()=>setPage('fax'),
    };
    const h=e=>{const fn=navMap[e.detail];if(fn)fn();};
    window.addEventListener('nav',h);
    return()=>window.removeEventListener('nav',h);
  },[]);

  const login=(t,u)=>{
    setToken(t);setUser(u);
    localStorage.setItem('mf_token',t);
    localStorage.setItem('mf_user',JSON.stringify(u));
  };
  const logout=()=>{setToken(null);setUser(null);localStorage.removeItem('mf_token');localStorage.removeItem('mf_user');};

  if(!token||!user) return <LoginPage onLogin={login}/>;

  const navigate=(id)=>{setPage(id);setSelectedPatient(null);setSidebarOpen(false);};

  const renderPage=()=>{
    if(page==='patients'&&selectedPatient==='new') return(
      <PatientForm token={token} patient={null}
        onSave={p=>{setSelectedPatient(p);toast('Patient created');}}
        onCancel={()=>setSelectedPatient(null)}
      />
    );
    if(page==='patients'&&selectedPatient) return(
      <PatientChart token={token} patient={selectedPatient} user={user}
        onBack={()=>setSelectedPatient(null)}
      />
    );
    if(page==='patients'&&!selectedPatient) return(
      <PatientList token={token}
        onSelect={p=>{setSelectedPatient(p);}}
        onNew={()=>setSelectedPatient('new')}
      />
    );
    if(page==='dashboard') return <Dashboard token={token}/>;
    if(page==='notes') return <NotesBrowser token={token} user={user}/>;
    if(page==='labs') return <LabsBrowser token={token}/>;
    if(page==='imaging') return <ImagingBrowser token={token}/>;
    if(page==='schedule') return <ScheduleModule token={token} user={user}/>;
    if(page==='fax') return <FaxCenter token={token}/>;
    if(page==='memberships') return <MembershipsBrowser token={token}/>;
    if(page==='enrollment') return <EnrollmentManager token={token}/>;
    if(page==='settings') return <Settings token={token} user={user}/>;
    return <Dashboard token={token}/>;
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Overlay */}
      {sidebarOpen&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:499}} onClick={()=>setSidebarOpen(false)}/>}

      {/* Sidebar */}
      <div className={`sidebar${sidebarOpen?' open':''}`} style={{width:240,background:'#0f2744',display:'flex',flexDirection:'column',padding:'16px 12px',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 4px',marginBottom:24}}>
          <div style={{width:36,height:36,background:'#2563eb',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="shield" size={20}/>
          </div>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:16}}>MedFlow</div>
            <div style={{color:'#64748b',fontSize:11}}>EMR v1.0</div>
          </div>
        </div>
        {NAV.map(n=>(
          <div key={n.id} className={`sidebar-item${page===n.id?' active':''}`} onClick={()=>navigate(n.id)}>
            <Icon name={n.icon} size={16}/>{n.label}
          </div>
        ))}
        <div style={{marginTop:'auto',paddingTop:16,borderTop:'1px solid #1e3a5f'}}>
          <div style={{padding:'8px 12px',color:'#64748b',fontSize:12}}>
            <div style={{color:'#94a3b8',fontWeight:500}}>{user.full_name}</div>
            <div>{user.specialty||user.role}</div>
          </div>
          <div className="sidebar-item" onClick={logout}><Icon name="logout" size={16}/>Sign Out</div>
        </div>
      </div>

      {/* Main */}
      <div className="main-content" style={{flex:1,overflow:'auto'}}>
        {/* Mobile header */}
        <div style={{display:'none',background:'#0f2744',padding:'12px 16px',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:10}} id="mobile-header">
          <button onClick={()=>setSidebarOpen(true)} style={{background:'none',border:'none',color:'#fff',cursor:'pointer',padding:4}}>
            <Icon name="menu" size={22}/>
          </button>
          <span style={{color:'#fff',fontWeight:700}}>MedFlow EMR</span>
        </div>
        <style>{`@media(max-width:768px){#mobile-header{display:flex!important;}}`}</style>
        <div style={{padding:24,maxWidth:1200,margin:'0 auto'}}>
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

// ── Small browser views (when accessing from nav, not patient chart) ───────────
function NotesBrowser({token,user}){
  const [notes,setNotes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [pdfLoading,setPdfLoading]=useState(null);
  const toast=useToast();

  useEffect(()=>{setLoading(true);api('GET','/api/notes',null,token).then(d=>{if(d)setNotes(d);setLoading(false);});},[token]);

  const downloadPDF=async(noteId)=>{
    setPdfLoading(noteId);
    const blob=await api('GET',`/api/notes/${noteId}/pdf`,null,token).catch(e=>{toast(e.message,'error');return null;});
    if(blob){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`note_${noteId}.pdf`;a.click();}
    setPdfLoading(null);
  };

  return(
    <div>
      <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b',marginBottom:16}}>Clinical Notes</h1>
      <p style={{color:'#64748b',marginBottom:20,fontSize:14}}>To create a note, open a patient chart and click "New Note".</p>
      {loading?<Spinner/>:notes.length===0?<div className="card" style={{textAlign:'center',padding:40,color:'#94a3b8'}}>No notes yet</div>:notes.map(n=>(
        <div key={n.id} className="card" style={{marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{fontWeight:600}}>{n.note_type} — {n.visit_date?.slice(0,10)}</div>
            <div style={{fontSize:13,color:'#64748b'}}>{n.chief_complaint?.slice(0,80)}</div>
            <div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>
              <span className={`badge ${n.status==='signed'?'badge-green':'badge-gray'}`}>{n.status}</span>
              {n.ai_generated&&<span className="badge badge-yellow">AI</span>}
            </div>
          </div>
          <button className="btn btn-outline" onClick={()=>downloadPDF(n.id)} disabled={pdfLoading===n.id}><Icon name="pdf" size={14}/>{pdfLoading===n.id?'…':'PDF'}</button>
        </div>
      ))}
    </div>
  );
}

function LabsBrowser({token}){
  const [labs,setLabs]=useState([]);
  const toast=useToast();
  useEffect(()=>{api('GET','/api/lab-orders',null,token).then(d=>d&&setLabs(d));},[token]);
  const transmit=async id=>{const r=await api('POST',`/api/lab-orders/${id}/transmit`,{},token).catch(e=>{toast(e.message,'error');return null;});if(r){toast('Transmitted');setLabs(labs.map(l=>l.id===id?{...l,status:'transmitted'}:l));}};
  return(
    <div>
      <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b',marginBottom:16}}>Lab Orders</h1>
      {labs.length===0?<div className="card" style={{textAlign:'center',padding:40,color:'#94a3b8'}}>No lab orders</div>:labs.map(l=>(
        <div key={l.id} className="card" style={{marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
          <div><div style={{fontWeight:600}}>{JSON.parse(l.tests||'[]').join(', ')}</div>
            <div style={{fontSize:13,color:'#64748b'}}>{l.facility} · {l.clinical_indication} · {l.created_at?.slice(0,10)}</div>
            <span className={`badge ${l.priority==='stat'?'badge-red':'badge-gray'}`}>{l.priority}</span>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span className={`badge ${l.status==='transmitted'?'badge-blue':'badge-yellow'}`}>{l.status}</span>
            {l.status==='pending'&&<button className="btn btn-primary" onClick={()=>transmit(l.id)} style={{fontSize:13}}><Icon name="send" size={13}/>Send</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

function ImagingBrowser({token}){
  const [orders,setOrders]=useState([]);
  const toast=useToast();
  useEffect(()=>{api('GET','/api/imaging-orders',null,token).then(d=>d&&setOrders(d));},[token]);
  const faxOrder=async id=>{const r=await api('POST',`/api/imaging-orders/${id}/fax`,{},token).catch(e=>{toast(e.message,'error');return null;});if(r){toast('Faxed');setOrders(orders.map(o=>o.id===id?{...o,fax_status:'sent'}:o));}};
  return(
    <div>
      <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b',marginBottom:16}}>Imaging Orders</h1>
      {orders.length===0?<div className="card" style={{textAlign:'center',padding:40,color:'#94a3b8'}}>No imaging orders</div>:orders.map(o=>(
        <div key={o.id} className="card" style={{marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
          <div><div style={{fontWeight:600}}>{o.study_type} — {o.body_part}</div>
            <div style={{fontSize:13,color:'#64748b'}}>{o.facility} · Fax: {o.fax_number} · {o.created_at?.slice(0,10)}</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span className={`badge ${o.fax_status==='sent'?'badge-green':'badge-yellow'}`}>{o.fax_status}</span>
            {o.fax_status==='pending'&&<button className="btn btn-primary" onClick={()=>faxOrder(o.id)} style={{fontSize:13}}><Icon name="fax" size={13}/>Fax</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

function MembershipsBrowser({token}){
  const [memberships,setMemberships]=useState([]);
  useEffect(()=>{api('GET','/api/memberships',null,token).then(d=>d&&setMemberships(d));},[token]);
  const total=memberships.filter(m=>m.status==='active').reduce((s,m)=>s+m.price_monthly,0);
  return(
    <div>
      <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b',marginBottom:16}}>Memberships</h1>
      <div className="card" style={{marginBottom:16,display:'flex',gap:24}}>
        <div><div style={{fontSize:28,fontWeight:800,color:'#16a34a'}}>${total.toFixed(0)}</div><div style={{fontSize:13,color:'#64748b'}}>Monthly Recurring Revenue</div></div>
        <div><div style={{fontSize:28,fontWeight:800,color:'#2563eb'}}>{memberships.filter(m=>m.status==='active').length}</div><div style={{fontSize:13,color:'#64748b'}}>Active Members</div></div>
      </div>
      {memberships.length===0?<div className="card" style={{textAlign:'center',padding:40,color:'#94a3b8'}}>No memberships</div>:memberships.map(m=>(
        <div key={m.id} className="card" style={{marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
          <div><div style={{fontWeight:600}}>{m.plan_name} — ${m.price_monthly}/mo</div>
            <div style={{fontSize:13,color:'#64748b'}}>Started {m.start_date?.slice(0,10)}</div>
          </div>
          <span className={`badge ${m.status==='active'?'badge-green':'badge-gray'}`}>{m.status}</span>
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<ToastProvider><App/></ToastProvider>);
</script>
</body>
