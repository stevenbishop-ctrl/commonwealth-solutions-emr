<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedFlow EMR</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Square Web Payments SDK loaded dynamically per environment (sandbox vs production) -->
<style>
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;}
  .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;cursor:pointer;color:#94a3b8;font-size:14px;font-weight:500;transition:all .15s;}
  .sidebar-item:hover{background:#1e3a5f;color:#fff;}
  .sidebar-item.active{background:#2563eb;color:#fff;}
  .card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:24px;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;}
  .btn-primary{background:#2563eb;color:#fff;} .btn-primary:hover{background:#1d4ed8;}
  .btn-secondary{background:#f1f5f9;color:#475569;} .btn-secondary:hover{background:#e2e8f0;}
  .btn-success{background:#16a34a;color:#fff;} .btn-success:hover{background:#15803d;}
  .btn-danger{background:#dc2626;color:#fff;} .btn-danger:hover{background:#b91c1c;}
  .btn-warning{background:#d97706;color:#fff;} .btn-warning:hover{background:#b45309;}
  .btn-outline{background:transparent;border:1px solid #cbd5e1;color:#475569;} .btn-outline:hover{background:#f8fafc;}
  .input{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border .15s;}
  .input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;}
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500;}
  .badge-blue{background:#dbeafe;color:#1d4ed8;} .badge-green{background:#dcfce7;color:#15803d;}
  .badge-red{background:#fee2e2;color:#dc2626;} .badge-yellow{background:#fef9c3;color:#854d0e;}
  .badge-gray{background:#f1f5f9;color:#475569;}
  .tab{padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#6b7280;}
  .tab.active{border-bottom-color:#2563eb;color:#2563eb;}
  .table-row:hover{background:#f8fafc;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
  .modal{background:#fff;border-radius:16px;max-height:90vh;overflow-y:auto;width:100%;max-width:680px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:2000;animation:slideUp .3s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .spinner{border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;width:20px;height:20px;animation:spin .6s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  textarea.input{min-height:80px;resize:vertical;}
  select.input{background:#fff;}
  @media(max-width:768px){.sidebar{transform:translateX(-100%);position:fixed;z-index:500;height:100vh;} .sidebar.open{transform:translateX(0);} .main-content{margin-left:0!important;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,createContext,useContext} = React;

// ── API base ──────────────────────────────────────────────────────────────────
// file://, localhost, or 127.0.0.1 → connect to local backend on port 8000
const API = (window.location.protocol === 'file:' ||
             window.location.hostname === 'localhost' ||
             window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8000'
  : '';

async function api(method,path,body,token){
  const headers={'Content-Type':'application/json'};
  if(token) headers['Authorization']=`Bearer ${token}`;
  const opts={method,headers};
  if(body && method!=='GET') opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  if(r.status===401){window.dispatchEvent(new Event('auth-expired'));return null;}
  if(!r.ok){const e=await r.json().catch(()=>({detail:'Error'}));throw new Error(e.detail||'Request failed');}
  if(r.headers.get('content-type')?.includes('application/pdf')) return r.blob();
  return r.json();
}

// ── Auth context ──────────────────────────────────────────────────────────────
const Auth=createContext(null);
function useAuth(){return useContext(Auth);}

// ── Toast ─────────────────────────────────────────────────────────────────────
const ToastCtx=createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type='success')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);
  return(
    <ToastCtx.Provider value={show}>
      {children}
      <div style={{position:'fixed',bottom:24,right:24,zIndex:2000,display:'flex',flexDirection:'column',gap:8}}>
        {toasts.map(t=>(
          <div key={t.id} className="toast" style={{background:t.type==='error'?'#dc2626':t.type==='warning'?'#d97706':'#1e293b'}}>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast=()=>useContext(ToastCtx);

// ── Icons (inline SVG) ────────────────────────────────────────────────────────
const Icon=({name,size=18,cls=''})=>{
  const icons={
    home:<><rect x="3" y="9" width="18" height="13" rx="1"/><polyline points="9 22 9 12 15 12 15 22"/><polyline points="2 10 12 2 22 10"/></>,
    users:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    file:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
    lab:<><path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M9 3h6"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/><path d="M3 9v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/><path d="M9 12h6"/><path d="M9 16h6"/></>,
    xray:<><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8"/><path d="M12 8v8"/></>,
    fax:<><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></>,
    payment:<><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></>,
    settings:<><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M12 2v2M12 20v2M2 12H0M22 12h2"/></>,
    logout:<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    pdf:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13h1a1 1 0 1 1 0 2H9v-2z"/><path d="M14 13h.5a1.5 1.5 0 0 1 0 3H14v-3z"/></>,
    robot:<><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M12 2a2 2 0 0 1 2 2v1H10V4a2 2 0 0 1 2-2z"/><line x1="9" y1="15" x2="9.01" y2="15"/><line x1="15" y1="15" x2="15.01" y2="15"/><path d="M8 11V7"/><path d="M16 11V7"/></>,
    send:<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
    check:<><polyline points="20 6 9 17 4 12"/></>,
    x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    chevron:<><polyline points="9 18 15 12 9 6"/></>,
    menu:<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>,
    shield:<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>,
    star:<><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>,
    calendar:<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    clipboard:<><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></>,
    pill:<><path d="M10.5 3.5a6 6 0 0 1 8.485 8.485l-3 3-5.485-5.485 3-3z"/><path d="m3.5 10.5 5.5 5.5"/><path d="M8.5 13.5 13 9"/></>,
  };
  return(
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cls}>
      {icons[name]||null}
    </svg>
  );
};

// ── Spinner ───────────────────────────────────────────────────────────────────
const Spinner=()=><span className="spinner"/>;

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({title,onClose,children,wide=false}){
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:wide?900:680}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 24px',borderBottom:'1px solid #e2e8f0'}}>
          <h2 style={{fontSize:18,fontWeight:700,color:'#1e293b'}}>{title}</h2>
          <button onClick={onClose} className="btn btn-secondary" style={{padding:'4px 8px'}}><Icon name="x" size={16}/></button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </div>
  );
}

// ── Form field helper ─────────────────────────────────────────────────────────
function Field({label,children,required=false}){
  return(
    <div>
      <label className="label">{label}{required&&<span style={{color:'#dc2626'}}> *</span>}</label>
      {children}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// LOGIN PAGE
// ═══════════════════════════════════════════════════════════════════════════════
function LoginPage({onLogin}){
  const [form,setForm]=useState({username:'',password:''});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  const submit=async e=>{
    e.preventDefault();
    setLoading(true);setErr('');
    try{
      const fd=new FormData();
      fd.append('username',form.username);
      fd.append('password',form.password);
      const r=await fetch(API+'/api/auth/login',{method:'POST',body:fd});
      if(!r.ok){const e=await r.json();throw new Error(e.detail);}
      const data=await r.json();
      onLogin(data.access_token,data.user);
    }catch(e){setErr(e.message||'Login failed');}
    finally{setLoading(false);}
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%)'}}>
      <div style={{background:'#fff',borderRadius:20,padding:40,width:'100%',maxWidth:420,boxShadow:'0 25px 60px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{width:60,height:60,background:'#dbeafe',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
            <Icon name="shield" size={32} cls="" style={{color:'#2563eb'}}/>
          </div>
          <h1 style={{fontSize:28,fontWeight:800,color:'#1e293b'}}>MedFlow EMR</h1>
          <p style={{color:'#64748b',fontSize:14,marginTop:4}}>Secure Clinical Management</p>
        </div>
        {err&&<div style={{background:'#fee2e2',color:'#dc2626',padding:'10px 14px',borderRadius:8,marginBottom:16,fontSize:14}}>{err}</div>}
        <form onSubmit={submit}>
          <div style={{marginBottom:16}}>
            <label className="label">Username</label>
            <input className="input" value={form.username} onChange={e=>setForm({...form,username:e.target.value})} placeholder="username" required/>
          </div>
          <div style={{marginBottom:24}}>
            <label className="label">Password</label>
            <input className="input" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="password" required/>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px'}} disabled={loading}>
            {loading?<Spinner/>:'Sign In'}
          </button>
        </form>
        <p style={{fontSize:12,color:'#94a3b8',textAlign:'center',marginTop:24}}>
          HIPAA-compliant • All access is logged • 256-bit JWT auth
        </p>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function Dashboard({token}){
  const [stats,setStats]=useState(null);
  const toast=useToast();

  useEffect(()=>{
    api('GET','/api/dashboard/stats',null,token).then(s=>s&&setStats(s)).catch(()=>{});
  },[token]);

  const cards=[
    {label:'Total Patients',key:'total_patients',icon:'users',color:'#2563eb',bg:'#dbeafe'},
    {label:'Notes Today',key:'notes_today',icon:'file',color:'#16a34a',bg:'#dcfce7'},
    {label:'Pending Labs',key:'pending_lab_orders',icon:'lab',color:'#d97706',bg:'#fef9c3'},
    {label:'Active Memberships',key:'active_memberships',icon:'star',color:'#7c3aed',bg:'#ede9fe'},
  ];

  return(
    <div>
      <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b',marginBottom:24}}>Dashboard</h1>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:16,marginBottom:24}}>
        {cards.map(c=>(
          <div key={c.key} className="card" style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{width:48,height:48,borderRadius:12,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Icon name={c.icon} size={22} cls="" style={{color:c.color}}/>
            </div>
            <div>
              <div style={{fontSize:28,fontWeight:800,color:'#1e293b'}}>{stats?stats[c.key]:'—'}</div>
              <div style={{fontSize:13,color:'#64748b'}}>{c.label}</div>
            </div>
          </div>
        ))}
      </div>
      <div className="card">
        <h2 style={{fontSize:16,fontWeight:600,color:'#1e293b',marginBottom:12}}>Quick Actions</h2>
        <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
          {[['New Patient','users'],['New Note','file'],['Lab Order','lab'],['Send Fax','fax']].map(([l,i])=>(
            <button key={l} className="btn btn-outline" onClick={()=>window.dispatchEvent(new CustomEvent('nav',{detail:l.toLowerCase().replace(' ','-')}))}>
              <Icon name={i} size={15}/>{l}
            </button>
          ))}
        </div>
      </div>
      <div className="card" style={{marginTop:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,color:'#16a34a',marginBottom:8}}>
          <Icon name="shield" size={16}/><span style={{fontSize:14,fontWeight:600}}>HIPAA Compliance Active</span>
        </div>
        <p style={{fontSize:13,color:'#64748b'}}>All PHI access is automatically audit-logged with user ID, timestamp, and IP address. Token expiry: 8 hours.</p>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// PATIENT LIST
// ═══════════════════════════════════════════════════════════════════════════════
function PatientList({token,onSelect,onNew}){
  const [patients,setPatients]=useState([]);
  const [search,setSearch]=useState('');
  const [loading,setLoading]=useState(true);

  const load=useCallback(async(q='')=>{
    setLoading(true);
    const data=await api('GET',`/api/patients${q?`?search=${encodeURIComponent(q)}`:''}`,null,token);
    if(data) setPatients(data);
    setLoading(false);
  },[token]);

  useEffect(()=>{load();},[load]);

  const handleSearch=e=>{
    const v=e.target.value;setSearch(v);
    clearTimeout(window._st);window._st=setTimeout(()=>load(v),400);
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b'}}>Patients</h1>
        <button className="btn btn-primary" onClick={onNew}><Icon name="plus" size={16}/>New Patient</button>
      </div>
      <div className="card">
        <div style={{position:'relative',marginBottom:16}}>
          <Icon name="search" size={16} cls="" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#94a3b8'}}/>
          <input className="input" style={{paddingLeft:36}} placeholder="Search by name, phone, or email…" value={search} onChange={handleSearch}/>
        </div>
        {loading?<div style={{textAlign:'center',padding:40}}><Spinner/></div>:(
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{borderBottom:'2px solid #e2e8f0'}}>
                  {['Name','DOB','Phone','Insurance',''].map(h=>(
                    <th key={h} style={{padding:'10px 12px',textAlign:'left',fontSize:13,fontWeight:600,color:'#475569'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {patients.length===0?
                  <tr><td colSpan={5} style={{textAlign:'center',padding:32,color:'#94a3b8'}}>No patients found</td></tr>:
                  patients.map(p=>(
                    <tr key={p.id} className="table-row" style={{borderBottom:'1px solid #f1f5f9'}}>
                      <td style={{padding:'12px 12px',fontWeight:500,color:'#1e293b'}}>{p.first_name} {p.last_name}</td>
                      <td style={{padding:'12px 12px',color:'#64748b',fontSize:14}}>{p.dob}</td>
                      <td style={{padding:'12px 12px',color:'#64748b',fontSize:14}}>{p.phone}</td>
                      <td style={{padding:'12px 12px'}}><span className="badge badge-blue">{p.insurance_name||'—'}</span></td>
                      <td style={{padding:'12px 12px'}}>
                        <button className="btn btn-outline" onClick={()=>onSelect(p)}><Icon name="chevron" size={14}/>Chart</button>
                      </td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// NEW / EDIT PATIENT FORM
// ═══════════════════════════════════════════════════════════════════════════════
function PatientForm({token,patient,onSave,onCancel}){
  const toast=useToast();
  const blank={first_name:'',last_name:'',dob:'',gender:'',phone:'',email:'',address:'',city:'',state:'',zip_code:'',insurance_name:'',insurance_id:'',insurance_group:'',emergency_contact:'',emergency_phone:'',ssn_last4:''};
  const [form,setForm]=useState(patient?{...blank,...patient}:blank);
  const [saving,setSaving]=useState(false);

  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const submit=async e=>{
    e.preventDefault();setSaving(true);
    try{
      const data=patient
        ?await api('PUT',`/api/patients/${patient.id}`,form,token)
        :await api('POST','/api/patients',form,token);
      if(data){toast(patient?'Patient updated':'Patient created');onSave(data);}
    }catch(e){toast(e.message,'error');}
    setSaving(false);
  };

  // G is a render helper — called as G({...}) not <G/> so React never treats
  // it as a component type. This prevents unmount-on-rerender focus loss.
  const G=({label,k,type='text',required=false,opts=null})=>(
    <div>
      <Field label={label} required={required}>
        {opts
          ?<select className="input" value={form[k]||''} onChange={set(k)}><option value="">Select…</option>{opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
          :<input className="input" type={type} value={form[k]||''} onChange={set(k)} required={required}/>
        }
      </Field>
    </div>
  );

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b'}}>{patient?'Edit Patient':'New Patient'}</h1>
        <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
      </div>
      <form onSubmit={submit}>
        <div className="card" style={{marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:600,color:'#475569',marginBottom:16}}>Demographics</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {G({label:"First Name",k:"first_name",required:true})}
            {G({label:"Last Name",k:"last_name",required:true})}
            {G({label:"Date of Birth",k:"dob",type:"date",required:true})}
            {G({label:"Gender",k:"gender",opts:['Male','Female','Non-binary','Other','Prefer not to say']})}
            {G({label:"Phone",k:"phone"})}
            {G({label:"Email",k:"email",type:"email"})}
            {G({label:"SSN Last 4",k:"ssn_last4"})}
          </div>
        </div>
        <div className="card" style={{marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:600,color:'#475569',marginBottom:16}}>Address</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div style={{gridColumn:'span 2'}}>{G({label:"Street Address",k:"address"})}</div>
            {G({label:"City",k:"city"})}
            {G({label:"State",k:"state",opts:['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC']})}
            {G({label:"ZIP Code",k:"zip_code"})}
          </div>
        </div>
        <div className="card" style={{marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:600,color:'#475569',marginBottom:16}}>Insurance</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {G({label:"Insurance Name",k:"insurance_name"})}
            {G({label:"Member ID",k:"insurance_id"})}
            {G({label:"Group Number",k:"insurance_group"})}
          </div>
        </div>
        <div className="card" style={{marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:600,color:'#475569',marginBottom:16}}>Emergency Contact</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {G({label:"Contact Name",k:"emergency_contact"})}
            {G({label:"Contact Phone",k:"emergency_phone"})}
          </div>
        </div>
        <button className="btn btn-primary" type="submit" disabled={saving} style={{width:'100%',justifyContent:'center',padding:12}}>
          {saving?<Spinner/>:<><Icon name="check" size={16}/>{patient?'Save Changes':'Create Patient'}</>}
        </button>
      </form>
    </div>
  );
}

// CLINICAL NOTE EDITOR
// ═══════════════════════════════════════════════════════════════════════════════
const ICD10_COMMON=[
  {code:'Z00.00',desc:'Routine adult exam, no abnormal findings'},
  {code:'I10',desc:'Essential hypertension'},
  {code:'E11.9',desc:'Type 2 diabetes without complications'},
  {code:'E78.5',desc:'Hyperlipidemia, unspecified'},
  {code:'J06.9',desc:'Acute upper respiratory infection'},
  {code:'J44.1',desc:'COPD with acute exacerbation'},
  {code:'M54.5',desc:'Low back pain'},
  {code:'F41.1',desc:'Generalized anxiety disorder'},
  {code:'F32.9',desc:'Major depressive disorder'},
  {code:'N39.0',desc:'Urinary tract infection'},
  {code:'K21.0',desc:'GERD with esophagitis'},
  {code:'J18.9',desc:'Pneumonia, unspecified'},
  {code:'I25.10',desc:'Atherosclerotic heart disease'},
  {code:'E03.9',desc:'Hypothyroidism, unspecified'},
];

const CPT_COMMON=[
  {code:'99202',desc:'New patient, straightforward MDM'},
  {code:'99203',desc:'New patient, low complexity MDM'},
  {code:'99204',desc:'New patient, moderate complexity MDM'},
  {code:'99205',desc:'New patient, high complexity MDM'},
  {code:'99211',desc:'Est. patient, minimal MDM'},
  {code:'99212',desc:'Est. patient, straightforward MDM'},
  {code:'99213',desc:'Est. patient, low complexity MDM'},
  {code:'99214',desc:'Est. patient, moderate complexity MDM'},
  {code:'99215',desc:'Est. patient, high complexity MDM'},
  {code:'99395',desc:'Preventive visit, 18-39 years'},
  {code:'99396',desc:'Preventive visit, 40-64 years'},
  {code:'99397',desc:'Preventive visit, 65+ years'},
];

function NoteEditor({token,patient,note,onSave,onCancel}){
  const toast=useToast();
  const blank={chief_complaint:'',hpi:'',pmh:'',medications:'',allergies:'',ros:'',physical_exam:'',assessment:'',plan:'',icd10_codes:[],cpt_codes:[],note_type:'SOAP',visit_date:new Date().toISOString().slice(0,10),status:'draft',ai_generated:false};
  const [form,setForm]=useState(note?{...blank,...note,icd10_codes:JSON.parse(note.icd10_codes||'[]'),cpt_codes:JSON.parse(note.cpt_codes||'[]'),visit_date:note.visit_date?.slice(0,10)||blank.visit_date}:blank);
  const [saving,setSaving]=useState(false);
  const [genLoading,setGenLoading]=useState(false);
  const [aiPrompt,setAiPrompt]=useState('');
  const [showAI,setShowAI]=useState(false);
  const [pdfLoading,setPdfLoading]=useState(false);

  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const toggleCode=(type,code)=>{
    setForm(f=>{
      const arr=f[type];
      return {...f,[type]:arr.includes(code)?arr.filter(c=>c!==code):[...arr,code]};
    });
  };

  const saveNote=async(status='draft')=>{
    setSaving(true);
    try{
      const payload={...form,patient_id:patient.id,status};
      const data=note
        ?await api('PUT',`/api/notes/${note.id}`,payload,token)
        :await api('POST','/api/notes',payload,token);
      if(data){toast(status==='signed'?'Note signed & saved':'Note saved');onSave(data);}
    }catch(e){toast(e.message,'error');}
    setSaving(false);
  };

  const generateAI=async()=>{
    if(!aiPrompt.trim()) return;
    setGenLoading(true);
    try{
      const r=await api('POST','/api/notes/ai-generate',{prompt:aiPrompt,patient_id:patient.id},token);
      if(r?.success){
        setForm(f=>({...f,...r.note,icd10_codes:r.note.icd10_codes||[],cpt_codes:r.note.cpt_codes||[],ai_generated:true}));
        setShowAI(false);
        toast('AI note generated — please review before signing');
      } else {
        toast(r?.error||'AI generation failed','error');
      }
    }catch(e){toast(e.message,'error');}
    setGenLoading(false);
  };

  const downloadPDF=async()=>{
    if(!note?.id){toast('Save the note first','warning');return;}
    setPdfLoading(true);
    try{
      const blob=await api('GET',`/api/notes/${note.id}/pdf`,null,token);
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`note_${note.id}.pdf`;a.click();
      URL.revokeObjectURL(url);
    }catch(e){toast(e.message,'error');}
    setPdfLoading(false);
  };

  const TA=({label,k,rows=3})=>(
    <div>
      <label className="label">{label}</label>
      <textarea className="input" rows={rows} value={form[k]||''} onChange={set(k)} style={{minHeight:rows*28}}/>
    </div>
  );

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:700,color:'#1e293b'}}>{note?'Edit Note':'New Clinical Note'}</h1>
          <p style={{fontSize:13,color:'#64748b'}}>Patient: {patient.first_name} {patient.last_name}</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {note&&<button className="btn btn-outline" onClick={downloadPDF} disabled={pdfLoading}><Icon name="pdf" size={15}/>{pdfLoading?'…':'PDF'}</button>}
          <button className="btn btn-secondary" onClick={()=>setShowAI(true)}><Icon name="robot" size={15}/>AI Generate</button>
          <button className="btn btn-outline" onClick={onCancel}>Cancel</button>
          <button className="btn btn-secondary" onClick={()=>saveNote('draft')} disabled={saving}>Save Draft</button>
          <button className="btn btn-success" onClick={()=>saveNote('signed')} disabled={saving}><Icon name="check" size={15}/>Sign Note</button>
        </div>
      </div>

      {form.ai_generated&&<div style={{background:'#fef9c3',border:'1px solid #fde68a',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#854d0e'}}>
        ⚠️ AI-generated note — review all content carefully before signing. Physician is responsible for accuracy.
      </div>}

      {showAI&&(
        <div className="card" style={{marginBottom:16,border:'2px solid #2563eb'}}>
          <h3 style={{fontSize:15,fontWeight:600,color:'#1e293b',marginBottom:10}}>🤖 AI Note Generator (Local LLM)</h3>
          <p style={{fontSize:13,color:'#64748b',marginBottom:12}}>Describe the clinical encounter. The AI will generate a complete Medicare-compliant SOAP note with ICD-10 and CPT codes.</p>
          <textarea className="input" rows={4} value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)} placeholder="e.g. 65-year-old male with 2-week history of productive cough, fever 101.2°F, shortness of breath. PMH: HTN, DM2. On metformin and lisinopril. SpO2 94% on room air…"/>
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <button className="btn btn-primary" onClick={generateAI} disabled={genLoading||!aiPrompt.trim()}>
              {genLoading?<><Spinner/> Generating…</>:<><Icon name="robot" size={15}/>Generate Note</>}
            </button>
            <button className="btn btn-secondary" onClick={()=>setShowAI(false)}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        <div>
          <label className="label">Visit Date</label>
          <input className="input" type="date" value={form.visit_date} onChange={set('visit_date')}/>
        </div>
        <div>
          <label className="label">Note Type</label>
          <select className="input" value={form.note_type} onChange={set('note_type')}>
            {['SOAP','Progress Note','Initial Evaluation','Follow-Up','Annual Wellness','Telehealth'].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div style={{display:'grid',gap:12}}>
          <TA label="Chief Complaint" k="chief_complaint" rows={2}/>
          <TA label="History of Present Illness (HPI)" k="hpi" rows={4}/>
          <TA label="Past Medical / Surgical / Family History (PFSH)" k="pmh" rows={3}/>
          <TA label="Current Medications" k="medications" rows={3}/>
          <TA label="Allergies" k="allergies" rows={2}/>
          <TA label="Review of Systems (ROS)" k="ros" rows={4}/>
          <TA label="Physical Examination" k="physical_exam" rows={5}/>
          <TA label="Assessment & Diagnoses" k="assessment" rows={4}/>
          <TA label="Plan" k="plan" rows={5}/>
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <h3 style={{fontSize:15,fontWeight:600,color:'#1e293b',marginBottom:14}}>Billing Codes</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div>
            <h4 style={{fontSize:13,fontWeight:600,color:'#475569',marginBottom:8}}>ICD-10 Diagnosis Codes</h4>
            <div style={{maxHeight:200,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:8,padding:8}}>
              {ICD10_COMMON.map(c=>(
                <label key={c.code} style={{display:'flex',gap:8,padding:'4px 6px',borderRadius:4,cursor:'pointer',background:form.icd10_codes.includes(c.code)?'#dbeafe':'transparent'}}>
                  <input type="checkbox" checked={form.icd10_codes.includes(c.code)} onChange={()=>toggleCode('icd10_codes',c.code)}/>
                  <span style={{fontSize:13}}><b>{c.code}</b> — {c.desc}</span>
                </label>
              ))}
            </div>
            {form.icd10_codes.length>0&&<div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
              {form.icd10_codes.map(c=><span key={c} className="badge badge-blue">{c} <span style={{cursor:'pointer',marginLeft:4}} onClick={()=>toggleCode('icd10_codes',c)}>×</span></span>)}
            </div>}
          </div>
          <div>
            <h4 style={{fontSize:13,fontWeight:600,color:'#475569',marginBottom:8}}>CPT E&M Codes</h4>
            <div style={{maxHeight:200,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:8,padding:8}}>
              {CPT_COMMON.map(c=>(
                <label key={c.code} style={{display:'flex',gap:8,padding:'4px 6px',borderRadius:4,cursor:'pointer',background:form.cpt_codes.includes(c.code)?'#dcfce7':'transparent'}}>
                  <input type="checkbox" checked={form.cpt_codes.includes(c.code)} onChange={()=>toggleCode('cpt_codes',c.code)}/>
                  <span style={{fontSize:13}}><b>{c.code}</b> — {c.desc}</span>
                </label>
              ))}
            </div>
            {form.cpt_codes.length>0&&<div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
              {form.cpt_codes.map(c=><span key={c} className="badge badge-green">{c} <span style={{cursor:'pointer',marginLeft:4}} onClick={()=>toggleCode('cpt_codes',c)}>×</span></span>)}
            </div>}
          </div>
        </div>
      </div>

      <div style={{display:'flex',gap:8,justifyContent:'flex-end',flexWrap:'wrap'}}>
        <button className="btn btn-secondary" onClick={()=>saveNote('draft')} disabled={saving}>Save Draft</button>
        <button className="btn btn-success" onClick={()=>saveNote('signed')} disabled={saving}>
          <Icon name="check" size={15}/>Sign & Lock Note
        </button>
      </div>
    </div>
  );
}

// PATIENT CHART  (tabbed)
// ═══════════════════════════════════════════════════════════════════════════════
function PatientChart({token,patient,onBack,user}){
  const toast=useToast();
  const [tab,setTab]=useState('notes');
  const [notes,setNotes]=useState([]);
  const [labs,setLabs]=useState([]);
  const [imaging,setImaging]=useState([]);
  const [faxes,setFaxes]=useState([]);
  const [memberships,setMemberships]=useState([]);
  const [payments,setPayments]=useState([]);
  const [patientData,setPatientData]=useState(patient);
  const [editingPatient,setEditingPatient]=useState(false);
  const [portalForm,setPortalForm]=useState({email:'',password:''});
  const [portalSaving,setPortalSaving]=useState(false);
  const [editNote,setEditNote]=useState(null);
  const [showNewNote,setShowNewNote]=useState(false);
  const [showLabForm,setShowLabForm]=useState(false);
  const [showImagingForm,setShowImagingForm]=useState(false);
  const [showFaxForm,setShowFaxForm]=useState(false);
  const [showMembershipForm,setShowMembershipForm]=useState(false);
  const [showSquareMembershipModal,setShowSquareMembershipModal]=useState(false);
  const [showPaymentForm,setShowPaymentForm]=useState(false);
  const [showSquareModal,setShowSquareModal]=useState(false);
  const [showZapriteModal,setShowZapriteModal]=useState(false);
  const [pdfLoading,setPdfLoading]=useState(null);
  const [labResults,setLabResults]=useState({});    // { [order_id]: result obj }
  const [checkingResult,setCheckingResult]=useState(new Set());
  const [expandedResult,setExpandedResult]=useState(null); // order_id whose results are open

  useEffect(()=>{
    const pid=patient.id;
    api('GET',`/api/notes?patient_id=${pid}`,null,token).then(d=>d&&setNotes(d));
    api('GET',`/api/lab-orders?patient_id=${pid}`,null,token).then(d=>d&&setLabs(d));
    api('GET',`/api/imaging-orders?patient_id=${pid}`,null,token).then(d=>d&&setImaging(d));
    api('GET',`/api/memberships?patient_id=${pid}`,null,token).then(d=>d&&setMemberships(d));
    api('GET',`/api/payments?patient_id=${pid}`,null,token).then(d=>d&&setPayments(d));
  },[patient.id,token]);

  const downloadPDF=async(noteId)=>{
    setPdfLoading(noteId);
    const blob=await api('GET',`/api/notes/${noteId}/pdf`,null,token).catch(e=>{toast(e.message,'error');return null;});
    if(blob){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`note_${noteId}.pdf`;a.click();URL.revokeObjectURL(url);}
    setPdfLoading(null);
  };

  const transmitLab=async(id)=>{
    const r=await api('POST',`/api/lab-orders/${id}/transmit`,{},token).catch(e=>{toast(e.message,'error');return null;});
    if(r){
      toast('Lab order transmitted to LabCorp');
      setLabs(labs.map(l=>l.id===id?{...l,status:'transmitted',labcorp_order_id:r.labcorp_order_id||l.labcorp_order_id}:l));
    }
  };

  const faxImaging=async(id)=>{
    const r=await api('POST',`/api/imaging-orders/${id}/fax`,{},token).catch(e=>{toast(e.message,'error');return null;});
    if(r){toast('Imaging order faxed');setImaging(imaging.map(o=>o.id===id?{...o,fax_status:'sent'}:o));}
  };

  const checkResult=async(id)=>{
    setCheckingResult(prev=>{const s=new Set(prev);s.add(id);return s;});
    try{
      const r=await api('GET',`/api/lab-orders/${id}/result`,null,token);
      if(r){
        setLabResults(prev=>({...prev,[id]:r}));
        if(r.observations?.length>0){
          setLabs(prev=>prev.map(l=>l.id===id?{...l,status:'resulted'}:l));
          setExpandedResult(id);
          toast('Results received from LabCorp');
        } else {
          toast(r.status==='pending'?'Results not yet available':'Status: '+r.status);
        }
      }
    }catch(e){toast(e.message,'error');}
    setCheckingResult(prev=>{const s=new Set(prev);s.delete(id);return s;});
  };

  const downloadResultPdf=async(id)=>{
    try{
      const resp=await fetch(`/api/lab-orders/${id}/result-pdf`,{headers:{Authorization:`Bearer ${token}`}});
      if(!resp.ok)throw new Error('PDF not available');
      const blob=await resp.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`lab_result_${id}.pdf`;a.click();URL.revokeObjectURL(url);
    }catch(e){toast(e.message,'error');}
  };

  if(showNewNote||editNote) return(
    <NoteEditor token={token} patient={patient} note={editNote}
      onSave={n=>{
        setNotes(prev=>editNote?prev.map(x=>x.id===n.id?n:x):[n,...prev]);
        setEditNote(null);setShowNewNote(false);
      }}
      onCancel={()=>{setEditNote(null);setShowNewNote(false);}}
    />
  );

  const tabs=[['info','Demographics','users'],['history','History & Meds','clipboard'],['rx','Prescriptions','pill'],['notes','Notes','file'],['labs','Labs','lab'],['imaging','Imaging','xray'],['fax','Fax','fax'],['memberships','Memberships','star'],['payments','Payments','payment']];

  const statusBadge=(s)=>{
    const map={draft:'badge-gray',signed:'badge-green',pending:'badge-yellow',transmitted:'badge-blue',sent:'badge-blue',active:'badge-green',cancelled:'badge-red',completed:'badge-green',failed:'badge-red',routine:'badge-gray',stat:'badge-red'};
    return <span className={`badge ${map[s]||'badge-gray'}`}>{s}</span>;
  };

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button className="btn btn-outline" onClick={onBack}>← Back</button>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:'#1e293b'}}>{patient.first_name} {patient.last_name}</h1>
          <p style={{fontSize:13,color:'#64748b'}}>DOB: {patient.dob} · {patient.phone} · {patient.insurance_name}</p>
        </div>
      </div>

      <div style={{display:'flex',gap:0,borderBottom:'2px solid #e2e8f0',marginBottom:16,overflowX:'auto'}}>
        {tabs.map(([k,l,i])=>(
          <button key={k} className={`tab${tab===k?' active':''}`} onClick={()=>setTab(k)} style={{display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>
            <Icon name={i} size={14}/>{l}
          </button>
        ))}
      </div>

      {/* DEMOGRAPHICS TAB */}
      {tab==='info'&&(
        <div>
          {!editingPatient?(
            <div>
              <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
                <button className="btn btn-primary" onClick={()=>setEditingPatient(true)}><Icon name="edit" size={15}/>Edit Demographics</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <div className="card">
                  <h3 style={{fontSize:14,fontWeight:600,color:'#475569',marginBottom:12}}>Personal Information</h3>
                  {[['Full Name',`${patientData.first_name} ${patientData.last_name}`],['Date of Birth',patientData.dob],['Gender',patientData.gender],['Phone',patientData.phone],['Email',patientData.email],['SSN Last 4',patientData.ssn_last4?`***-**-${patientData.ssn_last4}`:'—']].map(([l,v])=>(
                    <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f1f5f9',fontSize:14}}>
                      <span style={{color:'#64748b'}}>{l}</span><span style={{fontWeight:500,color:'#1e293b'}}>{v||'—'}</span>
                    </div>
                  ))}
                </div>
                <div className="card">
                  <h3 style={{fontSize:14,fontWeight:600,color:'#475569',marginBottom:12}}>Address</h3>
                  {[['Street',patientData.address],['City',patientData.city],['State',patientData.state],['ZIP',patientData.zip_code]].map(([l,v])=>(
                    <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f1f5f9',fontSize:14}}>
                      <span style={{color:'#64748b'}}>{l}</span><span style={{fontWeight:500,color:'#1e293b'}}>{v||'—'}</span>
                    </div>
                  ))}
                </div>
                <div className="card">
                  <h3 style={{fontSize:14,fontWeight:600,color:'#475569',marginBottom:12}}>Insurance</h3>
                  {[['Insurance',patientData.insurance_name],['Member ID',patientData.insurance_id],['Group #',patientData.insurance_group]].map(([l,v])=>(
                    <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f1f5f9',fontSize:14}}>
                      <span style={{color:'#64748b'}}>{l}</span><span style={{fontWeight:500,color:'#1e293b'}}>{v||'—'}</span>
                    </div>
                  ))}
                </div>
                <div className="card">
                  <h3 style={{fontSize:14,fontWeight:600,color:'#475569',marginBottom:12}}>Emergency Contact</h3>
                  {[['Name',patientData.emergency_contact],['Phone',patientData.emergency_phone]].map(([l,v])=>(
                    <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f1f5f9',fontSize:14}}>
                      <span style={{color:'#64748b'}}>{l}</span><span style={{fontWeight:500,color:'#1e293b'}}>{v||'—'}</span>
                    </div>
                  ))}
                </div>
              </div>
              {/* Patient Portal Activation */}
              <div className="card" style={{marginTop:16,border: patientData.portal_active ? '1px solid #bbf7d0' : '1px solid #e2e8f0'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <h3 style={{fontSize:14,fontWeight:600,color:'#475569',margin:0}}>Patient Portal Access</h3>
                  {patientData.portal_active
                    ? <span className="badge badge-green">Active</span>
                    : <span className="badge badge-gray">Not Activated</span>}
                </div>
                {patientData.portal_active&&(
                  <div style={{marginBottom:12,fontSize:13,color:'#374151'}}>
                    Login email: <b>{patientData.portal_email}</b>
                    <span style={{color:'#94a3b8',marginLeft:8}}>· Patient can log in at /portal</span>
                  </div>
                )}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                  <div>
                    <label className="label">{patientData.portal_active ? 'Change Email' : 'Portal Email'}</label>
                    <input className="input" type="email" value={portalForm.email} onChange={e=>setPortalForm(f=>({...f,email:e.target.value}))}
                      placeholder={patientData.portal_email||'patient@email.com'}/>
                  </div>
                  <div>
                    <label className="label">{patientData.portal_active ? 'New Password (leave blank to keep)' : 'Temporary Password'}</label>
                    <input className="input" type="password" value={portalForm.password} onChange={e=>setPortalForm(f=>({...f,password:e.target.value}))}
                      placeholder={patientData.portal_active ? 'Leave blank to keep current' : 'Set initial password'}/>
                  </div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary" disabled={portalSaving} onClick={async()=>{
                    const email = portalForm.email || patientData.portal_email;
                    const password = portalForm.password;
                    if(!email){toast('Email is required','error');return;}
                    if(!patientData.portal_active && !password){toast('Password is required for first activation','error');return;}
                    if(patientData.portal_active && !password && !portalForm.email){toast('Nothing to update','error');return;}
                    setPortalSaving(true);
                    const payload = {email};
                    if(password) payload.password = password;
                    const r = await api('POST',`/api/patients/${patientData.id}/portal/activate`,payload,token).catch(e=>{toast(e.message,'error');return null;});
                    if(r){setPatientData(d=>({...d,portal_active:true,portal_email:email}));setPortalForm({email:'',password:''});toast(patientData.portal_active?'Portal credentials updated':'Portal activated');}
                    setPortalSaving(false);
                  }}>{portalSaving?<Spinner/>:(patientData.portal_active?'Update Credentials':'Activate Portal')}</button>
                  {patientData.portal_active&&(
                    <button className="btn btn-danger" disabled={portalSaving} onClick={async()=>{
                      if(!confirm('Deactivate portal access for this patient?')) return;
                      setPortalSaving(true);
                      const r = await api('POST',`/api/patients/${patientData.id}/portal/deactivate`,{},token).catch(e=>{toast(e.message,'error');return null;});
                      if(r){setPatientData(d=>({...d,portal_active:false}));toast('Portal access deactivated');}
                      setPortalSaving(false);
                    }}>Deactivate</button>
                  )}
                </div>
              </div>
            </div>
          ):(
            <PatientForm token={token} patient={patientData}
              onSave={updated=>{setPatientData(updated);setEditingPatient(false);toast('Patient updated');}}
              onCancel={()=>setEditingPatient(false)}
            />
          )}
        </div>
      )}

      {/* NOTES TAB */}
      {tab==='notes'&&(
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>setShowNewNote(true)}><Icon name="plus" size={15}/>New Note</button>
          </div>
          {notes.length===0?<div className="card" style={{textAlign:'center',color:'#94a3b8',padding:40}}>No notes yet</div>:notes.map(n=>(
            <div key={n.id} className="card" style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
                <div>
                  <div style={{fontWeight:600,color:'#1e293b'}}>{n.note_type} — {n.visit_date?.slice(0,10)}</div>
                  <div style={{fontSize:13,color:'#64748b',marginTop:2}}>{n.chief_complaint?.slice(0,80)}…</div>
                  <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap'}}>
                    {statusBadge(n.status)}
                    {n.ai_generated&&<span className="badge badge-yellow">AI-assisted</span>}
                    {JSON.parse(n.icd10_codes||'[]').slice(0,3).map(c=><span key={c} className="badge badge-blue">{c}</span>)}
                    {JSON.parse(n.cpt_codes||'[]').slice(0,2).map(c=><span key={c} className="badge badge-green">{c}</span>)}
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                  <button className="btn btn-outline" onClick={()=>downloadPDF(n.id)} disabled={pdfLoading===n.id}><Icon name="pdf" size={14}/>{pdfLoading===n.id?'…':'PDF'}</button>
                  {n.status!=='signed'&&<button className="btn btn-outline" onClick={()=>setEditNote(n)}><Icon name="edit" size={14}/>Edit</button>}
                  <button
                    className={`btn ${n.patient_visible?'btn-success':'btn-outline'}`}
                    style={{fontSize:12}}
                    title={n.patient_visible?'Visible in patient portal — click to hide':'Click to release to patient portal'}
                    onClick={async()=>{
                      const r=await api('PATCH',`/api/notes/${n.id}/patient-visible`,{patient_visible:!n.patient_visible},token).catch(e=>{toast(e.message,'error');return null;});
                      if(r) setNotes(notes.map(x=>x.id===n.id?{...x,patient_visible:r.patient_visible}:x));
                    }}
                  >{n.patient_visible?'👁 In Portal':'Share to Portal'}</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* LABS TAB */}
      {tab==='labs'&&(
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>setShowLabForm(true)}><Icon name="plus" size={15}/>New Lab Order</button>
          </div>

          {labs.length===0&&<div className="card" style={{textAlign:'center',color:'#94a3b8',padding:40}}>No lab orders</div>}

          {labs.map(l=>{
            const result=labResults[l.id];
            const isChecking=checkingResult.has(l.id);
            const obs=result?.observations||[];
            const isExpanded=expandedResult===l.id;
            const hasNewResults=l.status==='resulted'&&obs.length>0;
            const abnormals=obs.filter(o=>o.abnormal_flag&&o.abnormal_flag!=='N'&&o.abnormal_flag!=='');
            return(
              <div key={l.id} className="card" style={{marginBottom:10,border:hasNewResults?'2px solid #16a34a':'1px solid #e2e8f0'}}>
                {/* Order header */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14,marginBottom:2}}>
                      {JSON.parse(l.tests||'[]').join(', ')}
                      {hasNewResults&&<span style={{marginLeft:8,fontSize:11,background:'#dcfce7',color:'#16a34a',padding:'2px 8px',borderRadius:10,fontWeight:700}}>✓ RESULTS IN</span>}
                      {abnormals.length>0&&<span style={{marginLeft:6,fontSize:11,background:'#fee2e2',color:'#dc2626',padding:'2px 8px',borderRadius:10,fontWeight:700}}>⚠ {abnormals.length} ABNORMAL</span>}
                    </div>
                    <div style={{fontSize:12,color:'#64748b'}}>
                      {l.facility} · {l.created_at?.slice(0,10)} · {statusBadge(l.priority)}
                      {l.labcorp_order_id&&<span style={{marginLeft:8,fontFamily:'monospace',color:'#94a3b8'}}>LC#{l.labcorp_order_id}</span>}
                    </div>
                    {l.clinical_indication&&<div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{l.clinical_indication}</div>}
                  </div>
                  <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                    {statusBadge(l.status)}
                    {l.status==='pending'&&(
                      <button className="btn btn-primary" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>transmitLab(l.id)}>
                        <Icon name="send" size={13}/>Send to LabCorp
                      </button>
                    )}
                    {(l.status==='transmitted'||l.status==='resulted')&&(
                      <button className="btn btn-outline" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>checkResult(l.id)} disabled={isChecking}>
                        {isChecking?<Spinner/>:<><Icon name="check" size={13}/>Check Results</>}
                      </button>
                    )}
                    {(hasNewResults||result?.has_pdf)&&(
                      <button className="btn btn-outline" style={{fontSize:12,padding:'4px 10px',background:'#f0fdf4',color:'#16a34a',borderColor:'#16a34a'}}
                        onClick={()=>setExpandedResult(isExpanded?null:l.id)}>
                        {isExpanded?'Hide Results':'View Results'}
                      </button>
                    )}
                    {result?.has_pdf&&(
                      <button className="btn btn-outline" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>downloadResultPdf(l.id)} title="Download PDF">
                        ⬇ PDF
                      </button>
                    )}
                  </div>
                </div>

                {/* Expanded result observations */}
                {isExpanded&&obs.length>0&&(
                  <div style={{marginTop:14,borderTop:'1px solid #e2e8f0',paddingTop:12}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:8}}>
                      RESULT — {result.received_at?.slice(0,10)}
                      {result.status&&<span style={{marginLeft:8,textTransform:'uppercase',color:'#94a3b8'}}>{result.status}</span>}
                    </div>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                      <thead>
                        <tr style={{borderBottom:'1px solid #e2e8f0'}}>
                          {['Test','Result','Units','Reference Range','Flag'].map(h=>(
                            <th key={h} style={{textAlign:'left',padding:'4px 8px',color:'#64748b',fontWeight:600,fontSize:11}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {obs.map((o,i)=>{
                          const isAbn=o.abnormal_flag&&o.abnormal_flag!=='N'&&o.abnormal_flag!=='';
                          const isCritical=['HH','LL'].includes(o.abnormal_flag);
                          return(
                            <tr key={i} style={{
                              borderBottom:'1px solid #f8fafc',
                              background:isCritical?'#fef2f2':isAbn?'#fffbeb':'transparent'
                            }}>
                              <td style={{padding:'5px 8px',fontWeight:500}}>{o.name}</td>
                              <td style={{padding:'5px 8px',fontWeight:isAbn?700:400,color:isCritical?'#dc2626':isAbn?'#d97706':'#1e293b'}}>{o.value}</td>
                              <td style={{padding:'5px 8px',color:'#64748b'}}>{o.units}</td>
                              <td style={{padding:'5px 8px',color:'#64748b'}}>{o.reference_range}</td>
                              <td style={{padding:'5px 8px'}}>
                                {isAbn&&<span style={{
                                  fontSize:11,fontWeight:700,padding:'1px 6px',borderRadius:8,
                                  background:isCritical?'#fee2e2':'#fef9c3',
                                  color:isCritical?'#dc2626':'#92400e'
                                }}>{o.abnormal_flag}</span>}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                    {abnormals.length>0&&(
                      <div style={{marginTop:10,padding:'8px 12px',background:'#fef2f2',borderRadius:8,fontSize:12,color:'#991b1b'}}>
                        ⚠ {abnormals.length} abnormal value{abnormals.length>1?'s':''}: {abnormals.map(o=>o.name).join(', ')}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          {showLabForm&&<LabOrderForm token={token} patient={patient} onSave={o=>{setLabs([o,...labs]);setShowLabForm(false);}} onCancel={()=>setShowLabForm(false)}/>}
        </div>
      )}

      {/* IMAGING TAB */}
      {tab==='imaging'&&(
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>setShowImagingForm(true)}><Icon name="plus" size={15}/>New Imaging Order</button>
          </div>
          {imaging.length===0?<div className="card" style={{textAlign:'center',color:'#94a3b8',padding:40}}>No imaging orders</div>:imaging.map(o=>(
            <ImagingOrderCard key={o.id} order={o} token={token} onUpdate={updated=>setImaging(imaging.map(x=>x.id===updated.id?updated:x))}/>
          ))}
          {showImagingForm&&<ImagingOrderForm token={token} patient={patient} onSave={o=>{setImaging([o,...imaging]);setShowImagingForm(false);}} onCancel={()=>setShowImagingForm(false)}/>}
        </div>
      )}

      {/* FAX TAB */}
      {tab==='fax'&&(
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>setShowFaxForm(true)}><Icon name="plus" size={15}/>Send Fax</button>
          </div>
          {faxes.length===0?<div className="card" style={{textAlign:'center',color:'#94a3b8',padding:40}}>No faxes</div>:faxes.map(f=>(
            <div key={f.id} className="card" style={{marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
              <div><Icon name={f.direction==='sent'?'send':'fax'} size={14}/> <b>{f.direction.toUpperCase()}</b> — {f.subject}
                <div style={{fontSize:13,color:'#64748b'}}>{f.direction==='sent'?'To: ':'From: '}{f.direction==='sent'?f.to_number:f.from_number} · {f.pages}pp · {f.created_at?.slice(0,10)}</div>
              </div>
              {statusBadge(f.status)}
            </div>
          ))}
          {showFaxForm&&<FaxForm token={token} patient={patient} onSave={f=>{setFaxes([f,...faxes]);setShowFaxForm(false);}} onCancel={()=>setShowFaxForm(false)}/>}
        </div>
      )}

      {/* MEMBERSHIPS TAB */}
      {tab==='memberships'&&(
        <div>
          {showSquareMembershipModal&&<SquareMembershipModal token={token} patient={patient} onClose={()=>setShowSquareMembershipModal(false)} onSave={m=>{setMemberships([m,...memberships]);setShowSquareMembershipModal(false);toast('Subscription activated!');}}/>}
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12,gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-primary" style={{background:'#006aff'}} onClick={()=>setShowSquareMembershipModal(true)}>
              <span style={{fontSize:14}}>💳</span> Subscribe with Square
            </button>
            <button className="btn btn-secondary" onClick={()=>setShowMembershipForm(true)}><Icon name="plus" size={15}/>Manual Membership</button>
          </div>
          {memberships.length===0?<div className="card" style={{textAlign:'center',color:'#94a3b8',padding:40}}>No memberships</div>:memberships.map(m=>(
            <div key={m.id} className="card" style={{marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
              <div>
                <div style={{fontWeight:600}}>{m.plan_name}</div>
                <div style={{fontSize:13,color:'#64748b'}}>${m.price_monthly}/mo · Started {m.start_date?.slice(0,10)}</div>
                {m.next_billing_date&&<div style={{fontSize:11,color:'#64748b',marginTop:2}}>Next billing: {m.next_billing_date.slice(0,10)}</div>}
                {m.last_billed_at&&<div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>Last charged: {m.last_billed_at.slice(0,10)}</div>}
                {m.square_card_id&&<div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>Square card: …{m.square_card_id.slice(-6)}</div>}
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                {/* Billing status badge */}
                {m.billing_status==='past_due'&&<span style={{fontSize:11,background:'#fef3c7',color:'#92400e',borderRadius:4,padding:'2px 7px',fontWeight:600}}>Past Due</span>}
                {m.billing_status==='suspended'&&<span style={{fontSize:11,background:'#fee2e2',color:'#991b1b',borderRadius:4,padding:'2px 7px',fontWeight:600}}>Suspended</span>}
                {m.billing_failure_count>0&&<span style={{fontSize:11,color:'#ef4444'}}>⚠ {m.billing_failure_count} failed attempt{m.billing_failure_count>1?'s':''}</span>}
                {statusBadge(m.status)}
                {m.square_card_id&&m.status==='active'&&(
                  <button className="btn btn-danger" style={{fontSize:12,padding:'4px 10px'}} onClick={async()=>{
                    if(!window.confirm('Cancel this Square subscription?')) return;
                    const r=await api('DELETE',`/api/square/subscription/${m.id}`,null,token).catch(e=>{toast(e.message,'error');return null;});
                    if(r){toast('Subscription cancelled');setMemberships(memberships.map(x=>x.id===m.id?{...x,status:'cancelled'}:x));}
                  }}>Cancel Sub</button>
                )}
              </div>
            </div>
          ))}
          {showMembershipForm&&<MembershipForm token={token} patient={patient} onSave={m=>{setMemberships([m,...memberships]);setShowMembershipForm(false);}} onCancel={()=>setShowMembershipForm(false)}/>}
        </div>
      )}

      {/* PAYMENTS TAB */}
      {tab==='payments'&&(
        <div>
          {showSquareModal&&<SquarePaymentModal token={token} patient={patient} onClose={()=>setShowSquareModal(false)} onSave={p=>{setPayments(prev=>[p,...prev]);setShowSquareModal(false);}}/>}
          {showZapriteModal&&<ZapritePaymentModal token={token} patient={patient} onClose={()=>setShowZapriteModal(false)} onSave={p=>{setPayments(prev=>[p,...prev]);setShowZapriteModal(false);}}/>}
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12,gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-primary" style={{background:'#006aff'}} onClick={()=>setShowSquareModal(true)}>
              <span style={{fontSize:14}}>💳</span> Card (Square)
            </button>
            <button className="btn btn-primary" style={{background:'#f7931a'}} onClick={()=>setShowZapriteModal(true)}>
              <span style={{fontSize:14}}>⚡</span> Crypto (Zaprite)
            </button>
            <button className="btn btn-secondary" onClick={()=>setShowPaymentForm(true)}><Icon name="plus" size={15}/>Record Manual</button>
          </div>

          {/* Revenue summary */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:16}}>
            <div className="card" style={{padding:'14px 18px'}}>
              <div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>CARD (SQUARE)</div>
              <div style={{fontSize:20,fontWeight:800,color:'#006aff'}}>${payments.filter(p=>p.status==='completed'&&p.payment_method==='square').reduce((s,p)=>s+p.amount,0).toFixed(2)}</div>
            </div>
            <div className="card" style={{padding:'14px 18px'}}>
              <div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>CRYPTO (ZAPRITE)</div>
              <div style={{fontSize:20,fontWeight:800,color:'#f7931a'}}>${payments.filter(p=>p.status==='completed'&&p.payment_method==='crypto').reduce((s,p)=>s+p.amount,0).toFixed(2)}</div>
            </div>
            <div className="card" style={{padding:'14px 18px'}}>
              <div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>MANUAL</div>
              <div style={{fontSize:20,fontWeight:800,color:'#16a34a'}}>${payments.filter(p=>p.status==='completed'&&!['square','crypto'].includes(p.payment_method)).reduce((s,p)=>s+p.amount,0).toFixed(2)}</div>
            </div>
          </div>

          {/* Payments list */}
          {payments.length>0&&(
            <div>
              <h4 style={{fontSize:13,fontWeight:600,color:'#475569',marginBottom:8}}>Payment History</h4>
              {payments.map(p=>(
                <div key={p.id} className="card" style={{marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                  <div><div style={{fontWeight:600}}>${p.amount.toFixed(2)} — {p.description}</div>
                    <div style={{fontSize:13,color:'#64748b'}}>{p.payment_method} · {p.created_at?.slice(0,10)}</div>
                  </div>
                  {statusBadge(p.status)}
                </div>
              ))}
            </div>
          )}
          {payments.length===0&&<div className="card" style={{textAlign:'center',color:'#94a3b8',padding:40}}>No payments yet</div>}
          {showPaymentForm&&<PaymentForm token={token} patient={patient} onSave={p=>{setPayments([p,...payments]);setShowPaymentForm(false);}} onCancel={()=>setShowPaymentForm(false)}/>}
        </div>
      )}

      {/* HISTORY & MEDS TAB */}
      {tab==='history'&&<HistoryMedsTab token={token} patient={patient}/>}

      {/* PRESCRIPTIONS TAB */}
      {tab==='rx'&&<PrescribingTab token={token} patient={patient} user={user}/>}
    </div>
  );
}

// LAB TEST CATALOG PICKER
// ═══════════════════════════════════════════════════════════════════════════════
function LabTestPicker({token, selectedTests, onAdd, onRemove}){
  const toast=useToast();
  const [query,setQuery]=useState('');
  const [category,setCategory]=useState('');
  const [results,setResults]=useState([]);
  const [categories,setCategories]=useState([]);
  const [searching,setSearching]=useState(false);
  const [source,setSource]=useState('');
  // Custom test entry
  const [showCustom,setShowCustom]=useState(false);
  const [customName,setCustomName]=useState('');
  const [customCode,setCustomCode]=useState('');
  const debounceRef=useRef(null);

  useEffect(()=>{
    // Load categories and initial popular tests on mount
    api('GET','/api/labcorp/categories',null,token).then(d=>{
      if(d?.categories)setCategories(d.categories);
    });
    doSearch('','');
  },[token]);

  const doSearch=async(q,cat)=>{
    setSearching(true);
    const params=new URLSearchParams({page_size:'40'});
    if(q)params.set('q',q);
    if(cat)params.set('category',cat);
    try{
      const d=await api('GET',`/api/labcorp/tests?${params}`,null,token);
      if(d){setResults(d.tests||[]);setSource(d.source||'');}
    }catch(e){toast(e.message,'error');}
    setSearching(false);
  };

  const handleQuery=e=>{
    const v=e.target.value;
    setQuery(v);
    clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(()=>doSearch(v,category),300);
  };

  const handleCategory=cat=>{
    const next=cat===category?'':cat;
    setCategory(next);
    doSearch(query,next);
  };

  const isSelected=t=>selectedTests.some(s=>s.name===t.name&&s.code===t.code);

  const addCustom=()=>{
    if(!customName.trim()){toast('Enter a test name','error');return;}
    onAdd({name:customName.trim(),code:customCode.trim(),category:'Custom',specimen:''});
    setCustomName('');setCustomCode('');setShowCustom(false);
  };

  return(
    <div>
      {/* Selected tests chips */}
      {selectedTests.length>0&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
          {selectedTests.map((t,i)=>(

      <div style={{marginTop:10}}>

          </div>
        )}
      </div>
    </div>
  );
}
