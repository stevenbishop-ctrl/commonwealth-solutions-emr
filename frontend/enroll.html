                                            className="signature-input"
                                            placeholder="Type your full name as your electronic signature"
                                            value={formData.telehealthSignature}
                                            onChange={(e) => handleSignatureChange(e, 'telehealth')}
                                            disabled={!consentScrolled.telehealth}
                                        />
                                        {formData.telehealthSignature && (
                                            <div className="signature-timestamp">
                                                Signed: {new Date().toLocaleString()}
                                            </div>
                                        )}
                                        {errors.telehealth && (
                                            <div className="error-message show">{errors.telehealth}</div>
                                        )}
                                    </div>
                                </div>
                                {formData.telehealthSignature && (
                                    <div className="consent-status complete">✓ Signed</div>
                                )}
                                {!formData.telehealthSignature && expandedConsent === 'telehealth' && (
                                    <div className="consent-status">
                                        {!consentScrolled.telehealth ? 'Scroll to bottom to sign' : 'Ready to sign'}
                                    </div>
                                )}
                            </div>

                            {/* Communication Consent */}
                            <div className="consent-document">
                                <div
                                    className="consent-header"
                                    onClick={() => toggleConsent('communication')}
                                >
                                    <span>Electronic Communication Consent</span>
                                    <span className="consent-toggle">
                                        {expandedConsent === 'communication' ? '−' : '+'}
                                    </span>
                                </div>
                                <div className={`consent-body ${expandedConsent === 'communication' ? 'expanded' : ''}`}>
                                    <div
                                        className="consent-text"
                                        ref={scrollRefs.communication}
                                        onScroll={() => handleConsentScroll('communication')}
                                    >
                                        {COMMUNICATION_TEXT}
                                    </div>
                                </div>
                                <div className={`consent-footer ${expandedConsent === 'communication' ? 'active' : ''}`}>
                                    <div className="consent-form">
                                        <div className="checkbox-group">
                                            <input
                                                type="checkbox"
                                                id="communication-read"
                                                disabled={!consentScrolled.communication}
                                                onChange={() => {}}
                                                checked={consentScrolled.communication}
                                            />
                                            <label className="checkbox-label" htmlFor="communication-read">
                                                I have read and understand this Electronic Communication Consent
                                            </label>
                                        </div>
                                        <input
                                            type="text"
                                            className="signature-input"
                                            placeholder="Type your full name as your electronic signature"
                                            value={formData.communicationSignature}
                                            onChange={(e) => handleSignatureChange(e, 'communication')}
                                            disabled={!consentScrolled.communication}
                                        />
                                        {formData.communicationSignature && (
                                            <div className="signature-timestamp">
                                                Signed: {new Date().toLocaleString()}
                                            </div>
                                        )}
                                        {errors.communication && (
                                            <div className="error-message show">{errors.communication}</div>
                                        )}
                                    </div>

                                    {/* Granular channel consent checkboxes — shown after signature */}
                                    {formData.communicationSignature && (
                                        <div style={{marginTop:14,padding:'12px 16px',background:'#f0f9ff',borderRadius:8,border:'1px solid #bae6fd'}}>
                                            <div style={{fontWeight:600,fontSize:13,marginBottom:10,color:'#0369a1'}}>
                                                Select your preferred communication channels:
                                            </div>
                                            <label style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10,cursor:'pointer'}}>
                                                <input
                                                    type="checkbox"
                                                    checked={formData.communicationSmsConsent}
                                                    onChange={e=>setFormData(f=>({...f,communicationSmsConsent:e.target.checked}))}
                                                    style={{marginTop:2,width:16,height:16,flexShrink:0}}
                                                />
                                                <div>
                                                    <div style={{fontWeight:600,fontSize:13}}>💬 SMS Text Messages</div>
                                                    <div style={{fontSize:12,color:'#64748b',marginTop:2}}>
                                                        I consent to send and receive text messages with Zelphon Health for health communications.
                                                        I understand SMS is not encrypted and acknowledge the risks described above.
                                                    </div>
                                                </div>
                                            </label>
                                            <label style={{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer'}}>
                                                <input
                                                    type="checkbox"
                                                    checked={formData.communicationEmailConsent}
                                                    onChange={e=>setFormData(f=>({...f,communicationEmailConsent:e.target.checked}))}
                                                    style={{marginTop:2,width:16,height:16,flexShrink:0}}
                                                />
                                                <div>
                                                    <div style={{fontWeight:600,fontSize:13}}>✉️ Email</div>
                                                    <div style={{fontSize:12,color:'#64748b',marginTop:2}}>
                                                        I consent to receive health communications and appointment information via email.
                                                        I understand email is not fully encrypted and acknowledge the risks described above.
                                                    </div>
                                                </div>
                                            </label>
                                            {errors.communicationChannels && (
                                                <div className="error-message show" style={{marginTop:8}}>{errors.communicationChannels}</div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                {formData.communicationSignature && (
                                    <div className="consent-status complete">
                                        ✓ Signed · SMS: {formData.communicationSmsConsent?'Yes':'No'} · Email: {formData.communicationEmailConsent?'Yes':'No'}
                                    </div>
                                )}
                                {!formData.communicationSignature && expandedConsent === 'communication' && (
                                    <div className="consent-status">
                                        {!consentScrolled.communication ? 'Scroll to bottom to sign' : 'Ready to sign'}
                                    </div>
                                )}
                            </div>

                            {/* Membership Consent */}
                            <div className="consent-document">
                                <div
                                    className="consent-header"
                                    onClick={() => toggleConsent('membership')}
                                >
                                    <span>DPC Membership Agreement</span>
                                    <span className="consent-toggle">
                                        {expandedConsent === 'membership' ? '−' : '+'}
                                    </span>
                                </div>
                                <div className={`consent-body ${expandedConsent === 'membership' ? 'expanded' : ''}`}>
                                    <div
                                        className="consent-text"
                                        ref={scrollRefs.membership}
                                        onScroll={() => handleConsentScroll('membership')}
                                    >
                                        {MEMBERSHIP_TEXT}
                                    </div>
                                </div>
                                <div className={`consent-footer ${expandedConsent === 'membership' ? 'active' : ''}`}>
                                    <div className="consent-form">
                                        <div className="checkbox-group">
                                            <input
                                                type="checkbox"
                                                id="membership-read"
                                                disabled={!consentScrolled.membership}
                                                onChange={() => {}}
                                                checked={consentScrolled.membership}
                                            />
                                            <label className="checkbox-label" htmlFor="membership-read">
                                                I have read and understand this DPC Membership Agreement
                                            </label>
                                        </div>
                                        <input
                                            type="text"
                                            className="signature-input"
                                            placeholder="Type your full name as your electronic signature"
                                            value={formData.membershipSignature}
                                            onChange={(e) => handleSignatureChange(e, 'membership')}
                                            disabled={!consentScrolled.membership}
                                        />
                                        {formData.membershipSignature && (
                                            <div className="signature-timestamp">
                                                Signed: {new Date().toLocaleString()}
                                            </div>
                                        )}
                                        {errors.membership && (
                                            <div className="error-message show">{errors.membership}</div>
                                        )}
                                    </div>
                                </div>
                                {formData.membershipSignature && (
                                    <div className="consent-status complete">✓ Signed</div>
                                )}
                                {!formData.membershipSignature && expandedConsent === 'membership' && (
                                    <div className="consent-status">
                                        {!consentScrolled.membership ? 'Scroll to bottom to sign' : 'Ready to sign'}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Step 5: Payment */}
                    {step === 5 && (
                        <div className="step-content">
                            <h2 className="step-title">Select Payment Method</h2>

                            <div className="form-section">
                                <div className="form-section-title">Membership Fee</div>
                                {selectedPlan && (() => {
                                    const isAnnual = formData.billingCycle === 'annual';
                                    const amt = isAnnual && selectedPlan.price_annual > 0
                                        ? selectedPlan.price_annual
                                        : selectedPlan.price_monthly;
                                    const noPrice = !amt || amt === 0;
                                    return (
                                        <div className="info-box">
                                            <strong>{selectedPlan.name}</strong>
                                            <span style={{marginLeft:8,fontSize:12,background:isAnnual?'#dcfce7':'#dbeafe',color:isAnnual?'#15803d':'#1d4ed8',padding:'2px 8px',borderRadius:10,fontWeight:600}}>
                                                {isAnnual ? 'Annual' : 'Monthly'}
                                            </span>
                                            <br/>
                                            Amount: {noPrice ? 'Contact for Pricing' : `$${Number(amt).toFixed(2)} ${isAnnual ? 'per year' : 'per month'}`}
                                            {isAnnual && selectedPlan.price_monthly > 0 && selectedPlan.price_annual > 0 && (
                                                <span style={{marginLeft:8,fontSize:12,color:'#16a34a',fontWeight:600}}>
                                                    (Save ${((selectedPlan.price_monthly * 12) - selectedPlan.price_annual).toFixed(2)} vs monthly)
                                                </span>
                                            )}
                                        </div>
                                    );
                                })()}
                            </div>

                            <div className="form-section">
                                <div className="form-section-title">Choose Payment Method</div>
                                <div className="payment-methods">
                                    <div
                                        className={`payment-button ${formData.paymentMethod === 'square' ? 'selected' : ''}`}
                                        onClick={() => setFormData(prev => ({...prev, paymentMethod: 'square'}))}
                                    >
                                        <div className="payment-method-title">Pay with Card</div>
                                        <div className="payment-method-desc">Secure card payment via Square</div>
                                    </div>
                                    <div
                                        className={`payment-button ${formData.paymentMethod === 'zaprite' ? 'selected' : ''}`}
                                        onClick={() => setFormData(prev => ({...prev, paymentMethod: 'zaprite'}))}
                                    >
                                        <div className="payment-method-title">Pay with Zaprite</div>
                                        <div className="payment-method-desc">Card or Cryptocurrency</div>
                                    </div>
                                </div>
                            </div>

                            {formData.paymentMethod === 'square' && (
                                <div className="card-container active">
                                    <div className="form-section">
                                        <div className="form-section-title">Card Information</div>
                                        <div id="card-container"></div>
                                    </div>
                                </div>
                            )}

                            {errors.paymentMethod && (
                                <div className="error-message show">{errors.paymentMethod}</div>
                            )}
                        </div>
                    )}

                    {/* Step 6: Confirmation */}
                    {step === 6 && (
                        <div className="step-content">
                            <div className="confirmation-content">
                                <div className="confirmation-icon">✓</div>
                                <h2 className="confirmation-title">Welcome to Zelphon Health!</h2>
                                <p className="confirmation-message">
                                    Your enrollment has been received and is being reviewed. You'll hear from us within 1-2 business days to confirm your membership and get you set up with your provider.
                                </p>

                                <div className="confirmation-details">
                                    <p><strong>What's Next:</strong></p>
                                    <p>• You will receive a confirmation email at {formData.email}</p>
                                    <p>• Our team will contact you to schedule your initial appointment</p>
                                    <p>• You'll gain access to your patient portal for messaging and records</p>
                                    <p>• Your membership benefits will begin immediately upon activation</p>
                                </div>

                                <div className="confirmation-details">
                                    <p><strong>Questions?</strong></p>
                                    <p>Contact us at [PHONE] or [EMAIL]</p>
                                    <p>Office hours: Monday - Friday, 9 AM - 5 PM</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navigation Buttons */}
                    {step < 6 && (
                        <div className="button-group">
                            <button
                                className="btn-secondary"
                                onClick={handlePrevious}
                                disabled={step === 1}
                            >
                                Previous
                            </button>
                            {step < 5 && (
                                <button
                                    className="btn-primary"
                                    onClick={handleNext}
                                    disabled={loading}
                                >
                                    {loading ? 'Processing...' : 'Next'}
                                </button>
                            )}
                            {step === 5 && (
                                <button
                                    className="btn-primary"
                                    onClick={handlePayment}
                                    disabled={paymentProcessing}
                                >
                                    {paymentProcessing ? 'Processing Payment...' : 'Complete Payment'}
                                </button>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EnrollmentApp />);

        // Square SDK initialization placeholder
        window.SQUARE_APP_ID = '';
        window.SQUARE_LOCATION_ID = '';
    </script>
</body>
</html>
